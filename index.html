    function renderWeeklyBreakdownDonut(weekly) {
      const radius = 58;
      const circumference = 2 * Math.PI * radius;
      let offset = 0;
      const segments = weekly.rankedHabits.map((habit) => {
        const portion = weekly.compositionTotal ? habit.annualCompleted / weekly.compositionTotal : 0;
        const length = portion * circumference;
        const segment = {
          color: habit.color,
          dasharray: `${length} ${circumference - length}`,
          dashoffset: -offset
        };
        offset += length;
        return segment;
      });
      const leadHabit = weekly.rankedHabits[0];
      const leadShare = weekly.compositionTotal ? (leadHabit.annualCompleted / weekly.compositionTotal) * 100 : 0;
      return `
        <div class="ring-wrap" style="width:220px;height:220px">
          <svg viewBox="0 0 220 220" aria-hidden="true">
            <circle cx="110" cy="110" r="${radius}" fill="none" stroke="rgba(101,142,191,0.16)" stroke-width="16"></circle>
            ${segments.map((segment) => `
              <circle cx="110" cy="110" r="${radius}" fill="none" stroke="${segment.color}" stroke-width="16" stroke-linecap="butt" stroke-dasharray="${segment.dasharray}" stroke-dashoffset="${segment.dashoffset}" transform="rotate(-90 110 110)"></circle>
            `).join("")}
          </svg>
          <div class="ring-center">
            <div>
              <strong>${leadShare.toFixed(1)}%</strong>
              <span>${escapeHtml(leadHabit.name)}</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderMonthlyMatrix(monthly) {
      const dates = monthly.dates;
      const weekGroups = monthly.weekGroups;
      const monthData = getMonthData(state.selectedMonth);
      return `
        <div class="matrix-grid" style="--day-count:${dates.length}">
          <div class="matrix-group sticky-col">Habit / Day</div>
          ${weekGroups.map((group) => `<div class="matrix-group ${weekBgClass(group.weekIndex)}" style="grid-column: span ${group.days.length}">${group.label}</div>`).join("")}
          <div class="matrix-head sticky-col" style="justify-content:flex-start;padding-left:14px"><strong>Rows</strong><span>Daily habits</span></div>
          ${dates.map((date) => `
            <div class="matrix-head ${weekClass(getWeekBucket(date.getDate()))}">
              <span>${DAY_NAMES[date.getDay()]}</span>
              <strong>${date.getDate()}</strong>
            </div>
          `).join("")}
          ${monthly.displayRows.map((habit) => `
            <div class="matrix-habit sticky-col" style="--habit-color:${habit.color}">
              <div>
                <strong>${escapeHtml(habit.name)}</strong>
                <small>${habit.doneCount}/${habit.goal} • ${habit.percentage.toFixed(0)}% • ${habit.currentStreak}d streak</small>
              </div>
            </div>
            ${dates.map((date) => {
              const dateKey = toDateKey(date);
              const done = !!(monthData.dailyLogs[dateKey] && monthData.dailyLogs[dateKey][habit.id]);
              const weekIndex = getWeekBucket(date.getDate());
              return `
                <div class="matrix-cell ${weekClass(weekIndex)} ${done ? "done" : ""}" style="--habit-color:${habit.color}">
                  <button data-action="toggle-monthly-cell" data-habit-id="${habit.id}" data-date-key="${dateKey}">
                    <span class="matrix-box"></span>
                  </button>
                </div>
              `;
            }).join("")}
          `).join("")}
        </div>
      `;
    }

    function renderWeeklyMatrix(weekly) {
      return `
        <div class="weekly-matrix-grid" style="--week-count:${weekly.weekRows.length}">
          <div class="weekly-group sticky-col">Weekly Habit / Week</div>
          ${weekly.weekRows.map((week) => `<div class="weekly-group ${weekBgClass(week.weekIndex)}">${week.label}</div>`).join("")}
          <div class="weekly-head sticky-col" style="justify-content:flex-start;padding-left:14px"><strong>Rows</strong><span>Weekly habits</span></div>
          ${weekly.weekRows.map((week) => `
            <div class="weekly-head ${weekClass(week.weekIndex)}">
              <strong>${week.label}</strong>
              <span>${week.weeklyTaskDone}/${week.weeklyTaskGoal} • ${week.weeklyTaskPercentage.toFixed(0)}%</span>
            </div>
          `).join("")}
          ${weekly.habitRows.map((habit) => `
            <div class="weekly-habit sticky-col" style="--habit-color:${habit.color}">
              <div>
                <strong>${escapeHtml(habit.name)}</strong>
                <small>${habit.totalDone}/${habit.totalTarget} • ${habit.percentage.toFixed(0)}% month total</small>
              </div>
            </div>
            ${habit.perWeek.map((weekCell) => `
              <div class="weekly-cell ${weekClass(weekCell.weekIndex)}" style="color:${habit.color}">
                <div class="weekly-slot-grid">
                  ${weekCell.target === 0 ? `<span class="muted">No plan</span>` : weekCell.slots.map((done, slotIndex) => `
                    <button class="weekly-slot ${done ? "done" : ""}" data-action="toggle-weekly-slot" data-habit-id="${habit.id}" data-week-index="${weekCell.weekIndex}" data-slot-index="${slotIndex}"></button>
                  `).join("")}
                </div>
                <div class="weekly-cell-meta">${weekCell.done}/${weekCell.target} • ${weekCell.percentage.toFixed(0)}%</div>
              </div>
            `).join("")}
          `).join("")}
        </div>
      `;
    }

    function renderAnnualAuditMatrix(annual) {
      return `
        <div class="annual-audit-grid">
          <div class="annual-group sticky-col">Habit</div>
          <div class="annual-group sticky-col-2">Annual Goal</div>
          ${annual.months.map((month) => `<div class="annual-group ${quarterBgClass(month.monthIndex)}">${month.label}</div>`).join("")}
          <div class="annual-group">Overall</div>
          <div class="annual-head sticky-col" style="justify-content:flex-start;padding-left:14px"><strong>Rows</strong><span>Daily habits</span></div>
          <div class="annual-head sticky-col-2"><strong>Goal</strong><span>Year</span></div>
          ${annual.months.map((month) => `<div class="annual-head ${quarterBgClass(month.monthIndex)}"><strong>${month.label}</strong><span>${MONTH_NAMES[month.monthIndex]}</span></div>`).join("")}
          <div class="annual-head"><strong>Overall</strong><span>% / Count</span></div>
          <div class="annual-days sticky-col" style="justify-content:flex-start;padding-left:14px"><strong>Days Left</strong><span>By month</span></div>
          <div class="annual-days sticky-col-2"><strong>${annual.annualDaysLeft}</strong><span>Year</span></div>
          ${annual.months.map((month) => `<div class="annual-days ${quarterBgClass(month.monthIndex)}"><strong>${month.daysLeft}</strong><span>Days Left</span></div>`).join("")}
          <div class="annual-days"><strong>${annual.totalProgress.toFixed(0)}%</strong><span>${annual.annualCompletedTotal}/${annual.annualGoalTotal}</span></div>
          ${annual.habitRows.map((habit) => `
            <div class="annual-habit sticky-col" style="--habit-color:${habit.color}">
              <div>
                <strong>${escapeHtml(habit.name)}</strong>
                <small>${habit.annualCompleted}/${habit.annualGoal} • ${habit.annualPercentage.toFixed(0)}%</small>
              </div>
            </div>
            <div class="annual-head sticky-col-2"><strong>${habit.annualGoal}</strong><span>Annual Goal</span></div>
            ${habit.monthlyBreakdown.map((cell) => `
              <div class="annual-cell ${cell.passed ? "pass" : "fail"} ${quarterBgClass(cell.monthIndex)}">
                <div class="annual-cell-value">${cell.completed}/${cell.goal}</div>
                <div class="annual-cell-status">${cell.passed ? "✓ Met" : "✕ Below"}</div>
              </div>
            `).join("")}
            <div class="annual-cell ${habit.annualPercentage >= 100 ? "pass" : "fail"}">
              <div class="annual-cell-value">${habit.annualPercentage.toFixed(0)}%</div>
              <div class="annual-cell-status">${habit.annualCompleted}/${habit.annualGoal}</div>
            </div>
          `).join("")}
          <div class="annual-habit sticky-col overall-row" style="--habit-color:var(--cyan)">
            <div>
              <strong>TOTAL</strong>
              <small>Monthly totals row</small>
            </div>
          </div>
          <div class="annual-head sticky-col-2 overall-row"><strong>${annual.annualGoalTotal}</strong><span>Year Goal</span></div>
          ${annual.dailyMonthlyTotals.map((month) => `
            <div class="annual-cell ${month.completed >= month.goal ? "pass" : "fail"} ${quarterBgClass(month.monthIndex)} overall-row">
              <div class="annual-cell-value">${month.completed}/${month.goal}</div>
              <div class="annual-cell-status">${month.completed >= month.goal ? "✓ Met" : "✕ Below"}</div>
            </div>
          `).join("")}
          <div class="annual-cell ${annual.totalProgress >= 100 ? "pass" : "fail"} overall-row">
            <div class="annual-cell-value">${annual.totalProgress.toFixed(0)}%</div>
            <div class="annual-cell-status">${annual.annualCompletedTotal}/${annual.annualGoalTotal}</div>
          </div>
        </div>
      `;
    }

    function renderDurationDailyMatrix(duration) {
      return `
        <div class="matrix-grid" style="--day-count:${duration.dates.length}">
          <div class="matrix-group sticky-col">Habit / Day</div>
          <div class="matrix-group" style="grid-column: span ${duration.dates.length}">Duration Window</div>
          <div class="matrix-head sticky-col" style="justify-content:flex-start;padding-left:14px"><strong>Rows</strong><span>Daily habits</span></div>
          ${duration.dates.map((date) => `
            <div class="matrix-head ${weekClass(getWeekBucket(date.getDate()))}">
              <span>${DAY_NAMES[date.getDay()]}</span>
              <strong>${date.getDate()}</strong>
            </div>
          `).join("")}
          ${duration.habitRows.map((habit) => `
            <div class="matrix-habit sticky-col" style="--habit-color:${habit.color}">
              <div>
                <strong>${escapeHtml(habit.name)}</strong>
                <small>${habit.completed}/${habit.goal} • ${habit.percentage.toFixed(0)}%</small>
              </div>
            </div>
            ${duration.dates.map((date) => {
              const key = toDateKey(date);
              const done = !!getDailyLogForDateKey(key)[habit.id];
              return `
                <div class="matrix-cell ${weekClass(getWeekBucket(date.getDate()))} ${done ? "done" : ""}" style="--habit-color:${habit.color}">
                  <button data-action="toggle-monthly-cell" data-habit-id="${habit.id}" data-date-key="${key}">
                    <span class="matrix-box"></span>
                  </button>
                </div>
              `;
            }).join("")}
          `).join("")}
        </div>
      `;
    }

    function renderDurationChunkMatrix(duration) {
      return `
        <div class="weekly-matrix-grid" style="--week-count:${duration.chunks.length}">
          <div class="weekly-group sticky-col">Habit / Chunk</div>
          ${duration.chunks.map((chunk, index) => `<div class="weekly-group ${weekBgClass(index % 5)}">Days ${chunk[0].getDate()}-${chunk[chunk.length - 1].getDate()}</div>`).join("")}
          <div class="weekly-head sticky-col" style="justify-content:flex-start;padding-left:14px"><strong>Rows</strong><span>Daily habits</span></div>
          ${duration.chunks.map((chunk, index) => `<div class="weekly-head ${weekClass(index % 5)}"><strong>Chunk ${index + 1}</strong><span>${formatShortDate(chunk[0])} → ${formatShortDate(chunk[chunk.length - 1])}</span></div>`).join("")}
          ${duration.habitRows.map((habit) => `
            <div class="weekly-habit sticky-col" style="--habit-color:${habit.color}">
              <div>
                <strong>${escapeHtml(habit.name)}</strong>
                <small>${habit.completed}/${habit.goal} • ${habit.percentage.toFixed(0)}%</small>
              </div>
            </div>
            ${duration.chunks.map((chunk, index) => {
              const done = chunk.reduce((sum, date) => sum + (getDailyLogForDateKey(toDateKey(date))[habit.id] ? 1 : 0), 0);
              return `
                <div class="weekly-cell ${weekClass(index % 5)}" style="color:${habit.color}">
                  <div class="annual-cell-value">${done}/${chunk.length}</div>
                  <div class="weekly-cell-meta">${((done / chunk.length) * 100).toFixed(0)}% in chunk</div>
                </div>
              `;
            }).join("")}
          `).join("")}
        </div>
      `;
    }

    function describePeakDay(series) {
      const peak = series.reduce((best, current) => current.completed > best.completed ? current : best, series[0]);
      return `${formatShortDate(peak.date)} · ${peak.completed}`;
    }

    function timeAgo(timestamp) {
      const diff = Date.now() - timestamp;
      if (diff < 60000) return "just now";
      if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
      return `${Math.floor(diff / 86400000)}d ago`;
    }

    function setView(viewKey) {
      state.view = viewKey;
      location.hash = viewKey;
      saveState();
      render();
    }

    function shiftMonth(offset) {
      const [yearString, monthString] = state.selectedMonth.split("-");
      const date = new Date(Number(yearString), Number(monthString) - 1 + offset, 1);
      setSelectedMonth(`${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`);
    }

    function setSelectedMonth(monthKey) {
      if (!/^\d{4}-\d{2}$/.test(monthKey)) return;
      state.selectedMonth = monthKey;
      state.selectedYear = Number(monthKey.slice(0, 4));
      ensureMonthData(state, monthKey);
      state.ui.selectedWeeklyFocus = 0;
      saveState();
      render();
    }

    function setSelectedYear(yearValue) {
      const year = clampInteger(yearValue, 2000, 2100);
      state.selectedYear = year;
      ensureYearData(state, year);

      const currentMonthPart = state.selectedMonth.slice(5, 7);
      const nextMonthKey = `${year}-${currentMonthPart}`;
      state.selectedMonth = nextMonthKey;
      ensureMonthData(state, nextMonthKey);
      state.ui.selectedWeeklyFocus = 0;
      saveState();
      render();
    }

    function shiftYear(offset) {
      setSelectedYear(state.selectedYear + offset);
    }

    function setDurationRange(startValue, endValue) {
      const start = startValue || state.durationStart;
      const end = endValue || state.durationEnd;
      state.durationStart = start <= end ? start : end;
      state.durationEnd = start <= end ? end : start;
      saveState();
      render();
    }

    function toggleMonthlyCell(habitId, dateKey) {
      const logs = getMonthData(state.selectedMonth).dailyLogs;
      logs[dateKey] = logs[dateKey] || {};
      if (logs[dateKey][habitId]) delete logs[dateKey][habitId];
      else logs[dateKey][habitId] = 1;
      saveState();
      render();
    }

    function toggleWeeklySlot(habitId, weekIndex, slotIndex) {
      const monthData = getMonthData(state.selectedMonth);
      monthData.weeklyChecks[habitId][weekIndex][slotIndex] = !monthData.weeklyChecks[habitId][weekIndex][slotIndex];
      saveState();
      render();
    }

    function setMonthlyGoal(habitId, value) {
      getMonthData(state.selectedMonth).monthlyGoals[habitId] = clampInteger(value, 1, 31);
      saveState();
      render();
    }

    function setWeeklyTarget(habitId, weekIndex, value) {
      const monthData = getMonthData(state.selectedMonth);
      monthData.weeklyPlans[habitId][weekIndex] = clampInteger(value, 0, 6);
      ensureMonthData(state, state.selectedMonth);
      saveState();
      render();
    }

    function addMonthlyHabit() {
      const name = prompt("New monthly habit name:");
      if (!name) return;
      const clean = name.trim().replace(/\s+/g, " ");
      if (!clean) return;
      const idBase = clean.toLowerCase().replace(/[^a-z0-9]+/g, "-");
      let id = idBase;
      let suffix = 2;
      while (state.monthlyHabits.some((habit) => habit.id === id)) {
        id = `${idBase}-${suffix}`;
        suffix += 1;
      }
      state.monthlyHabits.push({
        id,
        name: clean,
        color: PALETTE[state.monthlyHabits.length % PALETTE.length],
        defaultGoal: 20
      });
      Object.keys(state.years).forEach((yearKey) => {
        ensureYearData(state, Number(yearKey));
        for (let monthIndex = 0; monthIndex < 12; monthIndex += 1) {
          const monthKey = `${yearKey}-${String(monthIndex + 1).padStart(2, "0")}`;
          ensureMonthData(state, monthKey);
          state.years[yearKey].months[monthKey].monthlyGoals[id] = 20;
        }
      });
      saveState();
      render();
    }

    function addWeeklyHabit() {
      const name = prompt("New weekly habit name:");
      if (!name) return;
      const clean = name.trim().replace(/\s+/g, " ");
      if (!clean) return;
      const idBase = clean.toLowerCase().replace(/[^a-z0-9]+/g, "-");
      let id = idBase;
      let suffix = 2;
      while (state.weeklyHabits.some((habit) => habit.id === id)) {
        id = `${idBase}-${suffix}`;
        suffix += 1;
      }
      state.weeklyHabits.push({
        id,
        name: clean,
        color: PALETTE[state.weeklyHabits.length % PALETTE.length]
      });
      Object.keys(state.years).forEach((yearKey) => {
        ensureYearData(state, Number(yearKey));
      });
      saveState();
      render();
    }

    function deleteMonthlyHabit(habitId) {
      const habit = state.monthlyHabits.find((item) => item.id === habitId);
      if (!habit) return;
      if (!confirm(`Delete monthly habit "${habit.name}"?`)) return;
      state.monthlyHabits = state.monthlyHabits.filter((item) => item.id !== habitId);
      Object.keys(state.years).forEach((yearKey) => {
        const yearData = getYearData(Number(yearKey));
        Object.keys(yearData.months).forEach((monthKey) => {
          const monthData = yearData.months[monthKey];
          delete monthData.monthlyGoals[habitId];
          Object.keys(monthData.dailyLogs).forEach((dateKey) => {
            if (monthData.dailyLogs[dateKey]) delete monthData.dailyLogs[dateKey][habitId];
          });
        });
      });
      saveState();
      render();
    }

    function deleteWeeklyHabit(habitId) {
      const habit = state.weeklyHabits.find((item) => item.id === habitId);
      if (!habit) return;
      if (!confirm(`Delete weekly habit "${habit.name}"?`)) return;
      state.weeklyHabits = state.weeklyHabits.filter((item) => item.id !== habitId);
      Object.keys(state.years).forEach((yearKey) => {
        const yearData = getYearData(Number(yearKey));
        Object.keys(yearData.months).forEach((monthKey) => {
          const monthData = yearData.months[monthKey];
          delete monthData.weeklyPlans[habitId];
          delete monthData.weeklyChecks[habitId];
        });
      });
      saveState();
      render();
    }

    function updateMonthlyHabitName(habitId, value) {
      const habit = state.monthlyHabits.find((item) => item.id === habitId);
      if (!habit) return;
      const clean = String(value || "").trim().replace(/\s+/g, " ");
      if (!clean) return;
      habit.name = clean;
      saveState();
      render();
    }

    function updateWeeklyHabitName(habitId, value) {
      const habit = state.weeklyHabits.find((item) => item.id === habitId);
      if (!habit) return;
      const clean = String(value || "").trim().replace(/\s+/g, " ");
      if (!clean) return;
      habit.name = clean;
      saveState();
      render();
    }

    function updateHabitColor(collection, habitId, value) {
      const habit = state[collection].find((item) => item.id === habitId);
      if (!habit) return;
      habit.color = value;
      saveState();
      render();
    }

    function updateNote(key, value) {
      getMonthData(state.selectedMonth).notes[key] = value;
      saveState();
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `habit-intelligence-${state.selectedMonth}.json`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    }

    function importJson(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          state = normalizeState(JSON.parse(String(reader.result || "")));
          saveState();
          render();
        } catch (error) {
          alert("Import failed. The JSON format is not valid for this app.");
        }
      };
      reader.readAsText(file);
    }

    function resetDemo() {
      if (!confirm("Replace all current data with the seeded demo dataset?")) return;
      state = normalizeState(seedState());
      saveState();
      render();
    }

    function handleHashNavigation() {
      const hash = location.hash.replace(/^#/, "");
      if (NAV_ITEMS.some((item) => item.key === hash)) state.view = hash;
    }

    app.addEventListener("click", (event) => {
      const target = event.target.closest("[data-nav], [data-action]");
      if (!target) return;
      if (target.dataset.nav) {
        setView(target.dataset.nav);
        return;
      }
      const action = target.dataset.action;
      if (action === "shift-month") shiftMonth(Number(target.dataset.offset));
      if (action === "shift-year") shiftYear(Number(target.dataset.offset));
      if (action === "set-filter") {
        state.ui.monthlyFilter = target.dataset.filter;
        saveState();
        render();
      }
      if (action === "set-sort") {
        state.ui.monthlySort = target.dataset.sort;
        saveState();
        render();
      }
      if (action === "toggle-monthly-cell") toggleMonthlyCell(target.dataset.habitId, target.dataset.dateKey);
      if (action === "toggle-weekly-slot") toggleWeeklySlot(target.dataset.habitId, Number(target.dataset.weekIndex), Number(target.dataset.slotIndex));
      if (action === "focus-week") {
        state.ui.selectedWeeklyFocus = Number(target.dataset.weekIndex);
        saveState();
        render();
      }
      if (action === "add-monthly-habit") addMonthlyHabit();
      if (action === "add-weekly-habit") addWeeklyHabit();
      if (action === "delete-monthly-habit") deleteMonthlyHabit(target.dataset.id);
      if (action === "delete-weekly-habit") deleteWeeklyHabit(target.dataset.id);
      if (action === "export-json") exportJson();
      if (action === "reset-demo") resetDemo();
      if (action === "jump-default-month") setSelectedMonth(DEFAULT_MONTH);
      if (action === "install-pwa") installPwa();
    });

    app.addEventListener("change", (event) => {
      const target = event.target;
      if (target.dataset.input === "month-picker") setSelectedMonth(target.value);
      if (target.dataset.input === "year-picker") setSelectedYear(target.value);
      if (target.dataset.input === "duration-start") setDurationRange(target.value, state.durationEnd);
      if (target.dataset.input === "duration-end") setDurationRange(state.durationStart, target.value);
      if (target.dataset.change === "monthly-goal") setMonthlyGoal(target.dataset.id, target.value);
      if (target.dataset.change === "weekly-target") setWeeklyTarget(target.dataset.id, Number(target.dataset.weekIndex), target.value);
      if (target.dataset.change === "monthly-name") updateMonthlyHabitName(target.dataset.id, target.value);
      if (target.dataset.change === "weekly-name") updateWeeklyHabitName(target.dataset.id, target.value);
      if (target.dataset.change === "monthly-color") updateHabitColor("monthlyHabits", target.dataset.id, target.value);
      if (target.dataset.change === "weekly-color") updateHabitColor("weeklyHabits", target.dataset.id, target.value);
      if (target.id === "importFile") {
        importJson(target.files[0]);
        target.value = "";
      }
      if (target.dataset.input === "firebase-config") {
        state.ui.firebaseConfigText = target.value;
        saveState();
      }
    });

    app.addEventListener("input", (event) => {
      const target = event.target;
      if (target.dataset.note) updateNote(target.dataset.note, target.value);
      if (target.dataset.input === "firebase-config") {
        state.ui.firebaseConfigText = target.value;
        saveState();
      }
    });

    function installPwa() {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      deferredInstallPrompt.userChoice.finally(() => {
        deferredInstallPrompt = null;
        render();
      });
    }

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      render();
    });

    window.addEventListener("online", render);
    window.addEventListener("offline", render);
    window.addEventListener("hashchange", () => {
      handleHashNavigation();
      render();
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch((error) => {
          console.warn("Service worker registration failed.", error);
        });
      });
    }

    handleHashNavigation();
    render();
  </script>
</body>
</html>
