<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Intelligence Suite</title>
  <meta name="theme-color" content="#061426">
  <meta name="description" content="Premium habit intelligence suite with monthly, weekly, and annual analytics dashboards, offline-first persistence, and installable PWA support.">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    :root {
      --bg-0: #020912;
      --bg-1: #04101f;
      --bg-2: #07192f;
      --panel: rgba(8, 24, 45, 0.9);
      --panel-2: rgba(11, 30, 54, 0.94);
      --panel-3: rgba(7, 19, 36, 0.96);
      --line: rgba(122, 177, 245, 0.15);
      --line-strong: rgba(139, 195, 255, 0.24);
      --text: #eff6ff;
      --muted: #8ea8c7;
      --muted-2: #6e88ad;
      --cyan: #53d8fb;
      --teal: #35d7c4;
      --green: #57e3a0;
      --purple: #9c8cff;
      --gold: #ffd166;
      --pink: #ff6ea9;
      --red: #ff778d;
      --orange: #ff9c6e;
      --blue-q: #58b8ff;
      --green-q: #5be39b;
      --gold-q: #ffd166;
      --pink-q: #ff8bb8;
      --week-1: #43c7ff;
      --week-2: #7d86ff;
      --week-3: #58da91;
      --week-4: #ffd166;
      --week-5: #ff8db9;
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --shadow-lg: 0 34px 90px rgba(0, 0, 0, 0.46);
      --shadow-md: 0 20px 54px rgba(0, 0, 0, 0.32);
      --topbar-h: 74px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(83, 216, 251, 0.13), transparent 25%),
        radial-gradient(circle at top right, rgba(156, 140, 255, 0.13), transparent 28%),
        radial-gradient(circle at bottom left, rgba(87, 227, 160, 0.08), transparent 22%),
        linear-gradient(180deg, #071427 0%, #04101f 58%, #020912 100%);
      color: var(--text);
      font-family: Bahnschrift, "Segoe UI Variable Display", "Trebuchet MS", "Segoe UI", sans-serif;
      letter-spacing: 0.01em;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      background: none;
      color: inherit;
      cursor: pointer;
    }

    code {
      font-family: Consolas, "Courier New", monospace;
      color: #d8ecff;
    }

    .app-shell {
      width: min(1780px, calc(100vw - 20px));
      margin: 10px auto;
      padding: 16px;
      border-radius: 34px;
      border: 1px solid rgba(120, 174, 240, 0.16);
      background: linear-gradient(180deg, rgba(5, 16, 30, 0.92), rgba(3, 12, 22, 0.97));
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(18px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: var(--topbar-h);
      padding: 10px 8px 18px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .brand-mark {
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background:
        radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.18), transparent 32%),
        linear-gradient(135deg, rgba(83, 216, 251, 0.24), rgba(156, 140, 255, 0.2));
      border: 1px solid rgba(137, 194, 255, 0.24);
      box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.03), 0 12px 30px rgba(0, 0, 0, 0.28);
      font-size: 1.35rem;
      font-weight: 800;
    }

    .brand-copy h1 {
      margin: 0;
      font-size: 1.46rem;
      line-height: 1.02;
      font-weight: 800;
    }

    .brand-copy p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.93rem;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status-pill,
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(126, 180, 249, 0.15);
      background: rgba(11, 29, 51, 0.86);
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .status-pill .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 10px currentColor;
    }

    .eyebrow {
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.72rem;
      background: rgba(83, 216, 251, 0.08);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid rgba(128, 181, 255, 0.16);
      background: linear-gradient(180deg, rgba(18, 39, 68, 0.96), rgba(9, 22, 41, 0.96));
      color: var(--text);
      transition: 160ms ease;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.015);
    }

    .button:hover {
      transform: translateY(-1px);
      border-color: rgba(137, 194, 255, 0.28);
    }

    .button.primary {
      background: linear-gradient(135deg, rgba(55, 198, 255, 0.22), rgba(117, 125, 255, 0.2));
      border-color: rgba(121, 208, 255, 0.28);
    }

    .button.danger {
      background: linear-gradient(135deg, rgba(255, 106, 150, 0.18), rgba(255, 148, 88, 0.18));
      border-color: rgba(255, 131, 160, 0.22);
    }

    .button.tiny {
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
    }

    .app-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 16px 6px 18px;
    }

    .nav-tab {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
      background: rgba(9, 21, 39, 0.72);
      border: 1px solid rgba(122, 177, 249, 0.1);
    }

    .nav-tab.active {
      color: var(--text);
      background: linear-gradient(135deg, rgba(83, 216, 251, 0.18), rgba(156, 140, 255, 0.16));
      border-color: rgba(132, 201, 255, 0.18);
    }

    .page {
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-width: 0;
    }

    .dashboard-grid-monthly {
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr) 360px;
      gap: 18px;
    }

    .dashboard-grid-weekly {
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr) 330px;
      gap: 18px;
    }

    .monthly-weekly-subsystem {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .carryover-strip-grid {
      display: grid;
      grid-template-columns: 220px 90px minmax(0, 1fr) 110px 90px 70px;
      gap: 8px;
      min-width: max-content;
      align-items: center;
    }

    .carryover-cell {
      min-height: 50px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(8, 21, 39, 0.82);
      border: 1px solid rgba(122, 177, 249, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .carryover-cell.label {
      justify-content: flex-start;
    }

    .mini-check-strip {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      overflow: hidden;
      justify-content: flex-start;
    }

    .mini-check {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      border: 2px solid rgba(146, 193, 246, 0.24);
      display: grid;
      place-items: center;
      font-size: 0.78rem;
      line-height: 1;
      color: var(--cyan);
      flex: 0 0 auto;
    }

    .mini-check.done {
      background: rgba(83, 216, 251, 0.16);
      border-color: var(--cyan);
    }

    .mini-check.done::after {
      content: "✓";
      font-weight: 800;
    }

    .monthly-weekly-grid {
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr) 300px;
      gap: 18px;
    }

    .grouped-week-chart {
      display: grid;
      grid-template-columns: repeat(5, minmax(160px, 1fr));
      gap: 12px;
      align-items: stretch;
    }

    .grouped-week-card,
    .task-week-card {
      border-radius: 20px;
      border: 1px solid rgba(122, 177, 249, 0.12);
      background: rgba(8, 21, 39, 0.82);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .week-band {
      padding: 10px 12px;
      color: #eef6ff;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .grouped-week-body,
    .task-week-body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 100%;
    }

    .mini-bars {
      display: flex;
      align-items: end;
      gap: 8px;
      min-height: 130px;
      padding-top: 4px;
    }

    .mini-bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .mini-bar {
      width: 100%;
      max-width: 18px;
      border-radius: 8px 8px 3px 3px;
      min-height: 8px;
    }

    .mini-bar-day,
    .mini-bar-value {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .week-metric-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .task-board {
      display: grid;
      grid-template-columns: repeat(5, minmax(170px, 1fr));
      gap: 12px;
      align-items: stretch;
    }

    .task-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(122, 177, 249, 0.08);
      min-height: 36px;
    }

    .task-row:last-child {
      border-bottom: 0;
    }

    .task-name {
      font-size: 0.84rem;
      color: var(--text);
    }

    .task-empty {
      color: var(--muted-2);
      font-size: 0.82rem;
      min-height: 36px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(122, 177, 249, 0.05);
    }

    .task-row-meta {
      font-size: 0.74rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .notes-pad {
      min-height: 270px;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.02) 0,
          rgba(255,255,255,0.02) 27px,
          rgba(122, 177, 249, 0.08) 27px,
          rgba(122, 177, 249, 0.08) 28px
        ),
        rgba(5, 16, 30, 0.92);
      line-height: 28px;
    }

    .dashboard-grid-annual {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr) 340px;
      gap: 18px;
    }

    .annual-center-stack {
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-width: 0;
    }

    .column {
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-width: 0;
    }

    .panel {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(11, 28, 52, 0.96), rgba(7, 19, 37, 0.96)),
        radial-gradient(circle at top right, rgba(83, 216, 251, 0.04), transparent 36%);
      box-shadow: var(--shadow-md);
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), transparent 36%);
      opacity: 0.42;
    }

    .panel-body {
      position: relative;
      z-index: 1;
      padding: 18px;
    }

    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .panel-header h2,
    .panel-header h3 {
      margin: 0;
      font-size: 1.03rem;
      letter-spacing: 0.04em;
    }

    .muted {
      color: var(--muted);
    }

    .subtle {
      color: var(--muted-2);
    }

    .month-hero h2,
    .week-hero h2,
    .annual-hero h2 {
      margin: 10px 0 0;
      font-size: 2rem;
      line-height: 0.96;
      font-weight: 800;
    }

    .month-hero p,
    .week-hero p,
    .annual-hero p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.56;
      font-size: 0.92rem;
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 209, 102, 0.18);
      color: #ffe6a0;
      background: rgba(255, 209, 102, 0.08);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .month-switcher {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 8px;
      margin-top: 18px;
    }

    .field,
    textarea,
    input[type="month"],
    input[type="text"],
    input[type="number"],
    input[type="color"] {
      width: 100%;
      min-height: 42px;
      border-radius: 14px;
      border: 1px solid rgba(123, 178, 248, 0.16);
      background: rgba(5, 16, 30, 0.9);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }

    textarea {
      min-height: 128px;
      resize: vertical;
      line-height: 1.5;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .stat-card {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(8, 21, 40, 0.86);
      border: 1px solid rgba(122, 177, 249, 0.12);
      min-width: 0;
    }

    .stat-card span {
      display: block;
      margin-bottom: 6px;
      font-size: 0.73rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .stat-card strong {
      display: block;
      font-size: 1rem;
    }

    .summary-band {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .summary-card {
      padding: 16px;
      min-height: 116px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(14, 34, 61, 0.95), rgba(8, 21, 40, 0.95));
      border: 1px solid rgba(124, 179, 255, 0.12);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .summary-card.completed {
      box-shadow: inset 0 0 0 1px rgba(87, 227, 160, 0.06);
    }

    .summary-card.remaining {
      box-shadow: inset 0 0 0 1px rgba(255, 110, 169, 0.06);
    }

    .summary-card span {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.76rem;
    }

    .summary-card strong {
      display: block;
      font-size: 2rem;
      line-height: 1;
      margin-top: 8px;
    }

    .summary-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .habit-list,
    .ranking-list,
    .analytics-table,
    .setup-list,
    .week-bar-list,
    .formula-list,
    .check-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .habit-row,
    .ranking-item,
    .analytics-row,
    .setup-item,
    .week-bar-item,
    .data-card,
    .report-card,
    .formula-item,
    .check-item,
    .annual-progress-row {
      padding: 13px 14px;
      border-radius: 18px;
      background: rgba(8, 21, 39, 0.82);
      border: 1px solid rgba(122, 177, 249, 0.12);
      min-width: 0;
    }

    .habit-row {
      display: grid;
      grid-template-columns: 12px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
    }

    .swatch {
      width: 12px;
      height: 42px;
      border-radius: 999px;
      box-shadow: 0 0 16px currentColor;
    }

    .habit-row strong,
    .setup-item strong,
    .ranking-item strong,
    .analytics-row strong,
    .annual-progress-row strong {
      display: block;
      font-size: 0.95rem;
    }

    .habit-row small,
    .setup-item small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
    }

    .row-value {
      text-align: right;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .row-value strong {
      font-size: 1rem;
      color: var(--text);
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .kpi-card {
      padding: 16px;
      min-height: 196px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(14, 34, 61, 0.96), rgba(8, 21, 40, 0.96)),
        radial-gradient(circle at top, rgba(255, 255, 255, 0.05), transparent 46%);
      border: 1px solid rgba(122, 177, 249, 0.12);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .annual-kpi-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .executive-kpi {
      padding: 16px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(14, 34, 61, 0.96), rgba(8, 21, 40, 0.96));
      border: 1px solid rgba(122, 177, 249, 0.12);
      min-height: 128px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .executive-kpi span {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.74rem;
    }

    .executive-kpi strong {
      display: block;
      font-size: 2rem;
      line-height: 1;
    }

    .executive-kpi p {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .ring-wrap {
      position: relative;
      width: 112px;
      height: 112px;
      margin: 8px auto 12px;
    }

    .ring-wrap svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .ring-center {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .ring-center strong {
      display: block;
      font-size: 1.32rem;
      line-height: 1;
    }

    .ring-center span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .kpi-card h3 {
      margin: 0;
      font-size: 0.96rem;
    }

    .kpi-card p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 0.81rem;
      line-height: 1.45;
    }

    .chart-shell svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .chart-legend {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.83rem;
    }

    .legend-inline {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .legend-inline span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .legend-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
    }

    .toolbar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .segmented {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(9, 22, 40, 0.88);
      border: 1px solid rgba(118, 172, 246, 0.12);
      flex-wrap: wrap;
    }

    .segmented button {
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .segmented button.active {
      color: var(--text);
      background: linear-gradient(135deg, rgba(56, 198, 255, 0.18), rgba(116, 126, 255, 0.18));
    }

    .matrix-scroll {
      overflow: auto;
      padding-bottom: 6px;
    }

    .matrix-grid {
      display: grid;
      grid-template-columns: 228px repeat(var(--day-count), 46px);

      const raw = localStorage.getItem(STORAGE_KEY);

          return normalizeState(JSON.parse(raw));

          console.warn("Saved state could not be parsed, falling back to demo seed.", error);
        }
      }
      return normalizeState(seedState());
    }

    function normalizeState(input) {
      const seed = seedState();
      const next = {
        view: input.view || seed.view,
        selectedMonth: input.selectedMonth || seed.selectedMonth,
        selectedYear: Number.isFinite(Number(input.selectedYear)) ? Number(input.selectedYear) : seed.selectedYear,

        years: input.years && typeof input.years === "object" ? input.years : seed.years

      ensureMonthData(next, next.selectedMonth);

        { id: "social", name: "Meaningful Reach-out", color: PALETTE[3] },
        { id: "finance", name: "Finance Review", color: PALETTE[4] },
        { id: "clean-car", name: "Clean The Car", color: PALETTE[5] },
        { id: "dog-grooming", name: "Dog Grooming", color: PALETTE[6] },
        { id: "learn-new", name: "Learn Something New", color: PALETTE[7] }
      ];

      const years = {
        2024: seedYearData(2024, monthlyHabits, weeklyHabits)
      };

      return {
        view: "monthly",
        selectedMonth: DEFAULT_MONTH,
        selectedYear: DEFAULT_YEAR,
        durationStart: "2024-08-01",
        durationEnd: "2024-09-14",
        ui: {
          monthlyFilter: "all",
          monthlySort: "default",
          selectedWeeklyFocus: 0,
          lastSavedAt: Date.now(),
          firebaseConfigText: ""
        },
        monthlyHabits,
        weeklyHabits,
        years
      };
    }

    function seedYearData(year, monthlyHabits, weeklyHabits) {
      const months = {};
      for (let monthIndex = 0; monthIndex < 12; monthIndex += 1) {
        const monthKey = `${year}-${String(monthIndex + 1).padStart(2, "0")}`;
        months[monthKey] = seedMonthData(year, monthIndex, monthlyHabits, weeklyHabits);
      }
      return {
        brandBadge: "Bestseller",
        months
      };
    }

    function seedMonthData(year, monthIndex, monthlyHabits, weeklyHabits) {
      const monthKey = `${year}-${String(monthIndex + 1).padStart(2, "0")}`;
      const dates = getMonthDates(monthKey);
      const monthlyGoals = {};
      const dailyLogs = {};
      const weeklyPlans = {};
      const weeklyChecks = {};

      monthlyHabits.forEach((habit, habitIndex) => {
        monthlyGoals[habit.id] = computeMonthlyGoal(habit, monthIndex, habitIndex, dates.length);
      });

      dates.forEach((date) => {
        const dateKey = toDateKey(date);
        dailyLogs[dateKey] = {};
        monthlyHabits.forEach((habit, habitIndex) => {
          const done = seededDailyCompletion(habit, year, monthIndex, habitIndex, date.getDate(), date.getDay(), dates.length);
          if (done) dailyLogs[dateKey][habit.id] = 1;
        });
      });

      if (monthKey === "2024-08") {
        [4, 10, 18, 27, 30].forEach((day) => {
          setSeedDaily(dailyLogs, monthKey, "hydration", day, true);
          setSeedDaily(dailyLogs, monthKey, "deep-work", day, true);
          setSeedDaily(dailyLogs, monthKey, "reading", day, true);
          setSeedDaily(dailyLogs, monthKey, "no-sugar", day, true);
          setSeedDaily(dailyLogs, monthKey, "walk", day, true);
        });
        [2, 5, 8, 11, 16, 20, 24, 29, 31].forEach((day) => setSeedDaily(dailyLogs, monthKey, "workout", day, true));
        [3, 4, 9, 15, 17, 22, 28, 29, 31].forEach((day) => setSeedDaily(dailyLogs, monthKey, "journaling", day, true));
        [1, 2, 6, 12, 19, 23, 26].forEach((day) => setSeedDaily(dailyLogs, monthKey, "sleep", day, false));
        [7, 14, 21].forEach((day) => {
          setSeedDaily(dailyLogs, monthKey, "hydration", day, false);
          setSeedDaily(dailyLogs, monthKey, "reading", day, false);
          setSeedDaily(dailyLogs, monthKey, "meditation", day, false);
        });
      }

      weeklyHabits.forEach((habit, weeklyIndex) => {
        weeklyPlans[habit.id] = computeWeeklyPlan(habit.id, monthIndex, weeklyIndex);
        weeklyChecks[habit.id] = weeklyPlans[habit.id].map((target, weekIndex) => {
          const slots = [];
          for (let slotIndex = 0; slotIndex < target; slotIndex += 1) {
            slots.push(seedWeeklyDone(habit.id, year, monthIndex, weekIndex, slotIndex));
          }
          return slots;
        });
      });

      if (monthKey === "2024-08") {
        const monthlyOverride = {
          "meal-prep": {
            plan: [0, 1, 1, 1, 1],
            checks: [[], [true], [true], [true], [true]]
          },
          "long-run": {
            plan: [0, 1, 1, 1, 0],
            checks: [[], [true], [true], [true], []]
          },
          "declutter": {
            plan: [0, 0, 1, 0, 1],
            checks: [[], [], [false], [], [false]]
          },
          "social": {
            plan: [0, 0, 0, 1, 0],
            checks: [[], [], [], [true], []]
          },
          "finance": {
            plan: [0, 0, 0, 1, 1],
            checks: [[], [], [], [false], [true]]
          },
          "clean-car": {
            plan: [0, 0, 0, 0, 0],
            checks: [[], [], [], [], []]
          },
          "dog-grooming": {
            plan: [0, 0, 0, 0, 0],
            checks: [[], [], [], [], []]
          },
          "learn-new": {
            plan: [0, 0, 0, 0, 0],
            checks: [[], [], [], [], []]
          }
        };
        Object.entries(monthlyOverride).forEach(([habitId, config]) => {
          if (weeklyPlans[habitId]) {
            weeklyPlans[habitId] = config.plan.slice();
            weeklyChecks[habitId] = config.checks.map((slots) => slots.slice());
          }
        });
      }

      return {
        monthlyGoals,
        dailyLogs,
        weeklyPlans,
        weeklyChecks,
        notes: seedNotes(monthIndex)
      };
    }

    function computeMonthlyGoal(habit, monthIndex, habitIndex, daysInMonth) {
      const seasonCurve = Math.sin((monthIndex + 1) * 0.75 + habitIndex * 0.33) * 2.2;
      const wave = Math.cos((monthIndex + 1) * 0.52 + habit.name.length * 0.11) * 1.7;
      const base = habit.defaultGoal;
      const shifted = Math.round(base + seasonCurve + wave);
      return clampInteger(shifted, 12, daysInMonth);
    }

    function seededDailyCompletion(habit, year, monthIndex, habitIndex, dayNumber, weekday, daysInMonth) {
      const profiles = {
        "hydration": { base: 0.83, weekend: -0.04, swing: 0.08, month: 0.04 },
        "deep-work": { base: 0.64, weekend: -0.17, swing: 0.17, month: 0.05 },
        "workout": { base: 0.49, weekend: 0.1, swing: 0.18, month: 0.07 },
        "reading": { base: 0.7, weekend: 0.05, swing: 0.09, month: 0.04 },
        "meditation": { base: 0.68, weekend: 0.02, swing: 0.1, month: 0.03 },
        "journaling": { base: 0.55, weekend: 0.08, swing: 0.16, month: 0.05 },
        "no-sugar": { base: 0.72, weekend: -0.11, swing: 0.11, month: 0.05 },
        "walk": { base: 0.66, weekend: 0.03, swing: 0.13, month: 0.04 },
        "language": { base: 0.5, weekend: -0.08, swing: 0.17, month: 0.06 },
        "sleep": { base: 0.61, weekend: -0.13, swing: 0.14, month: 0.05 },
        "stretch": { base: 0.58, weekend: 0.03, swing: 0.13, month: 0.04 },
        "protein": { base: 0.69, weekend: -0.05, swing: 0.1, month: 0.03 },
        "focus-plan": { base: 0.56, weekend: -0.12, swing: 0.15, month: 0.06 },
        "sunlight": { base: 0.64, weekend: 0.04, swing: 0.12, month: 0.04 },
        "screen-curfew": { base: 0.52, weekend: -0.15, swing: 0.16, month: 0.06 },
        "steps": { base: 0.48, weekend: 0.07, swing: 0.19, month: 0.06 }
      }[habit.id];
      const annualSeason = Math.sin((monthIndex + 1) * 0.58 + habitIndex * 0.19) * profiles.month;
      const monthlyWave = Math.sin((dayNumber + monthIndex * 2.2) * 0.64 + habitIndex * 0.17) * profiles.swing;
      const echo = Math.cos((dayNumber + habit.name.length) * 0.27) * 0.07;
      const lateMonthBoost = dayNumber > daysInMonth - 5 ? 0.03 : 0;
      const weekendModifier = weekday === 0 || weekday === 6 ? profiles.weekend : 0;
      const threshold = clamp(profiles.base + annualSeason + monthlyWave + echo + lateMonthBoost + weekendModifier, 0.08, 0.95);
      return hashNoise(`${year}-${monthIndex}-${habit.id}-${dayNumber}`) < threshold;
    }

    function computeWeeklyPlan(habitId, monthIndex, weeklyIndex) {
      const template = {
        "meal-prep": [1, 1, 1, 1, monthIndex % 2 === 0 ? 1 : 0],
        "long-run": [1, 1, 1, 1, 0],
        "declutter": [monthIndex % 3 === 0 ? 1 : 0, 1, 1, 0, 0],
        "social": [1, monthIndex % 2 === 0 ? 1 : 0, 1, 1, 0],
        "finance": [0, 1, 0, 1, 0],
        "clean-car": [0, 1, 0, 0, 0],
        "dog-grooming": [0, 0, 1, 0, 0],
        "learn-new": [1, 0, 0, 0, 0]
      };
      return (template[habitId] || [1, 1, 1, 1, 0]).slice();
    }

    function seedWeeklyDone(habitId, year, monthIndex, weekIndex, slotIndex) {
      const key = `${year}|${monthIndex}|${habitId}|${weekIndex}|${slotIndex}`;
      const biasMap = {
        "meal-prep": 0.84,
        "long-run": 0.67,
        "declutter": 0.57,
        "social": 0.63,
        "finance": 0.54,
        "clean-car": 0.88,
        "dog-grooming": 0.82,
        "learn-new": 0.9
      };
      return hashNoise(key) < (biasMap[habitId] || 0.6);
    }

    function seedNotes(monthIndex) {
      const reviews = [
        "The year started with ambition but uneven rhythm. Early wins came mostly from structured habits.",
        "February improved consistency but still showed weekend softness and planning gaps.",
        "March brought stronger recovery patterns and fewer habit-chain collapses than January.",
        "April increased physical consistency while concentration habits became more volatile.",
        "May had solid volume but weaker sleep hygiene, which reduced momentum quality.",
        "June produced stronger streak behavior, though some habits still depended too much on ideal days.",
        "July dipped in focus but held the base habits together better than expected.",
        "August showed recovery strength and clearer rebound after mid-month misses.",
        "September stabilized weekly planning, but language and sleep remained fragile.",
        "October improved cadence and reduced the severity of poor weeks.",
        "November showed strong volume with more over-target behavior in core routines.",
        "December preserved continuity better than earlier holiday periods, though evening habits softened."
      ];
      const nextMoves = [
        "Protect first-hour routines and reduce decision friction.",
        "Keep weekly reset visible and make fallback actions smaller.",
        "Use minimum viable completions after disruption instead of skipping entirely.",
        "Tie physical habits to time anchors instead of motivation.",
        "Reinforce evening shutdown to improve next-day execution quality.",
        "Preserve streaks by lowering ambition during high-load weeks.",
        "Front-load difficult habits before energy fragmentation begins.",
        "Carry the late-month recovery pattern into the next planning cycle.",
        "Make fragile habits more location- and cue-dependent.",
        "Keep the stronger cadence while avoiding weekend spillover.",
        "Convert temporary intensity into repeatable routines.",
        "Protect continuity over perfection as the year closes."
      ];
      return {
        weeklyReview: reviews[monthIndex],
        nextMoves: nextMoves[monthIndex]
      };
    }

    function setSeedDaily(dailyLogs, monthKey, habitId, day, value) {
      const [year, month] = monthKey.split("-");
      const key = `${year}-${month}-${String(day).padStart(2, "0")}`;
      dailyLogs[key] = dailyLogs[key] || {};
      if (value) dailyLogs[key][habitId] = 1;
      else delete dailyLogs[key][habitId];
    }

    function hashNoise(value) {
      let hash = 2166136261;
      for (let i = 0; i < value.length; i += 1) {
        hash ^= value.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return ((hash >>> 0) % 1000) / 1000;
    }

    function ensureYearData(targetState, year) {
      if (!targetState.years[year]) {
        targetState.years[year] = seedYearData(year, targetState.monthlyHabits, targetState.weeklyHabits);
      }
      const yearData = targetState.years[year];
      yearData.brandBadge = yearData.brandBadge || "Bestseller";
      yearData.months = yearData.months || {};
      for (let monthIndex = 0; monthIndex < 12; monthIndex += 1) {
        const monthKey = `${year}-${String(monthIndex + 1).padStart(2, "0")}`;
        if (!yearData.months[monthKey]) {
          yearData.months[monthKey] = seedMonthData(year, monthIndex, targetState.monthlyHabits, targetState.weeklyHabits);
        }
      }
    }

    function ensureMonthData(targetState, monthKey) {
      const year = Number(monthKey.slice(0, 4));
      ensureYearData(targetState, year);
      const yearData = targetState.years[year];
      if (!yearData.months[monthKey]) {
        const monthIndex = Number(monthKey.slice(5, 7)) - 1;
        yearData.months[monthKey] = seedMonthData(year, monthIndex, targetState.monthlyHabits, targetState.weeklyHabits);
      }
      const monthData = yearData.months[monthKey];
      monthData.monthlyGoals = monthData.monthlyGoals || {};
      monthData.dailyLogs = monthData.dailyLogs || {};
      monthData.weeklyPlans = monthData.weeklyPlans || {};
      monthData.weeklyChecks = monthData.weeklyChecks || {};
      monthData.notes = Object.assign({ weeklyReview: "", nextMoves: "" }, monthData.notes || {});

      targetState.monthlyHabits.forEach((habit, habitIndex) => {
        if (!Number.isFinite(Number(monthData.monthlyGoals[habit.id]))) {
          const monthIndex = Number(monthKey.slice(5, 7)) - 1;
          monthData.monthlyGoals[habit.id] = computeMonthlyGoal(habit, monthIndex, habitIndex, getMonthDates(monthKey).length);
        }
      });

      targetState.weeklyHabits.forEach((habit, weeklyIndex) => {
        if (!Array.isArray(monthData.weeklyPlans[habit.id])) {
          const monthIndex = Number(monthKey.slice(5, 7)) - 1;
          monthData.weeklyPlans[habit.id] = computeWeeklyPlan(habit.id, monthIndex, weeklyIndex);
        }
        monthData.weeklyPlans[habit.id] = monthData.weeklyPlans[habit.id]
          .slice(0, 5)
          .concat(Array(Math.max(0, 5 - monthData.weeklyPlans[habit.id].length)).fill(0))
          .map((value) => clampInteger(value, 0, 6));

        if (!Array.isArray(monthData.weeklyChecks[habit.id])) {
          monthData.weeklyChecks[habit.id] = [];
        }
        monthData.weeklyChecks[habit.id] = monthData.weeklyPlans[habit.id].map((target, weekIndex) => {
          const existing = Array.isArray(monthData.weeklyChecks[habit.id][weekIndex]) ? monthData.weeklyChecks[habit.id][weekIndex] : [];
          const slots = [];
          for (let slot = 0; slot < target; slot += 1) {
            slots.push(!!existing[slot]);
          }
          return slots;
        });
      });
    }

    function saveState() {
      state.ui.lastSavedAt = Date.now();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getYearData(year) {
      ensureYearData(state, year);
      return state.years[year];
    }

    function getMonthData(monthKey) {
      ensureMonthData(state, monthKey);
      const year = Number(monthKey.slice(0, 4));
      return state.years[year].months[monthKey];
    }

    function getMonthDates(monthKey) {
      const [yearString, monthString] = monthKey.split("-");
      const year = Number(yearString);
      const month = Number(monthString) - 1;
      const lastDay = new Date(year, month + 1, 0).getDate();
      const list = [];
      for (let day = 1; day <= lastDay; day += 1) {
        list.push(new Date(year, month, day));
      }
      return list;
    }

    function toDateKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function formatMonthLabel(monthKey) {
      const [yearString, monthString] = monthKey.split("-");
      return `${MONTH_NAMES[Number(monthString) - 1]} ${yearString}`;
    }

    function formatShortDate(date) {
      return `${MONTH_NAMES[date.getMonth()].slice(0, 3)} ${date.getDate()}`;
    }

    function getWeekBucket(dayNumber) {
      if (dayNumber <= 7) return 0;
      if (dayNumber <= 14) return 1;
      if (dayNumber <= 21) return 2;
      if (dayNumber <= 28) return 3;
      return 4;
    }

    function weekClass(index) {
      return `week-${index + 1}`;
    }

    function weekBgClass(index) {
      return `week-${index + 1}-bg`;
    }

    function quarterBgClass(monthIndex) {
      return `quarter-${Math.floor(monthIndex / 3) + 1}-bg`;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function clampInteger(value, min, max) {
      const number = Number(value);
      return Math.max(min, Math.min(max, Number.isFinite(number) ? Math.round(number) : min));
    }

    function average(values) {
      if (!values.length) return 0;
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function getDateRange(startKey, endKey) {
      const start = new Date(`${startKey}T00:00:00`);
      const end = new Date(`${endKey}T00:00:00`);
      if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) return [];
      const low = start <= end ? start : end;
      const high = start <= end ? end : start;
      const days = [];
      const cursor = new Date(low);
      while (cursor <= high) {
        days.push(new Date(cursor));
        cursor.setDate(cursor.getDate() + 1);
      }
      return days;
    }

    function getDailyLogForDateKey(dateKey) {
      const monthKey = dateKey.slice(0, 7);
      const monthData = getMonthData(monthKey);
      return monthData.dailyLogs[dateKey] || {};
    }

    function groupWeeks(dates) {
      const groups = [[], [], [], [], []];
      dates.forEach((date) => {
        groups[getWeekBucket(date.getDate())].push(date);
      });
      return groups.filter((group) => group.length);
    }

    function calculateCurrentStreak(habitId, dates, dailyLogs) {
      let streak = 0;
      for (let index = dates.length - 1; index >= 0; index -= 1) {
        const key = toDateKey(dates[index]);
        if (dailyLogs[key] && dailyLogs[key][habitId]) streak += 1;
        else if (streak > 0) break;
      }
      return streak;
    }

    function calculateLongestStreak(habitId, dates, dailyLogs) {
      let current = 0;
      let best = 0;
      dates.forEach((date) => {
        const key = toDateKey(date);
        if (dailyLogs[key] && dailyLogs[key][habitId]) {
          current += 1;
          best = Math.max(best, current);
        } else {
          current = 0;
        }
      });
      return best;
    }

    function getMonthlyAnalytics() {
      const monthKey = state.selectedMonth;
      const monthData = getMonthData(monthKey);
      const dates = getMonthDates(monthKey);
      const dateKeys = dates.map(toDateKey);
      const today = new Date();
      const actualMonthKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, "0")}`;
      const daysLeft = monthKey === actualMonthKey ? Math.max(0, dates.length - today.getDate()) : (monthKey > actualMonthKey ? dates.length : 0);

      const habitRows = state.monthlyHabits.map((habit, index) => {
        const goal = monthData.monthlyGoals[habit.id] || 0;
        const doneCount = dateKeys.reduce((sum, dateKey) => sum + (monthData.dailyLogs[dateKey] && monthData.dailyLogs[dateKey][habit.id] ? 1 : 0), 0);
        const remaining = Math.max(goal - doneCount, 0);
        const percentage = goal ? (doneCount / goal) * 100 : 0;
        const currentStreak = calculateCurrentStreak(habit.id, dates, monthData.dailyLogs);
        const longestStreak = calculateLongestStreak(habit.id, dates, monthData.dailyLogs);
        return { ...habit, index, goal, doneCount, remaining, percentage, currentStreak, longestStreak };
      });

      const dailySeries = dates.map((date) => {
        const dateKey = toDateKey(date);
        const completed = state.monthlyHabits.reduce((sum, habit) => sum + (monthData.dailyLogs[dateKey] && monthData.dailyLogs[dateKey][habit.id] ? 1 : 0), 0);
        return {
          date,
          dateKey,
          completed,
          percentage: state.monthlyHabits.length ? (completed / state.monthlyHabits.length) * 100 : 0,
          weekIndex: getWeekBucket(date.getDate())
        };
      });

      const weekGroups = groupWeeks(dates).map((group, weekIndex) => {
        const completed = group.reduce((sum, date) => {
          const key = toDateKey(date);
          return sum + state.monthlyHabits.reduce((rowSum, habit) => rowSum + (monthData.dailyLogs[key] && monthData.dailyLogs[key][habit.id] ? 1 : 0), 0);
        }, 0);
        const possible = group.length * state.monthlyHabits.length;
        return {
          label: weekIndex < 4 ? `Week ${weekIndex + 1}` : "Extra Days",
          weekIndex,
          days: group,
          completed,
          possible,
          percentage: possible ? (completed / possible) * 100 : 0
        };
      });

      const totalCompleted = habitRows.reduce((sum, habit) => sum + habit.doneCount, 0);
      const totalGoals = habitRows.reduce((sum, habit) => sum + habit.goal, 0);
      const totalRemaining = habitRows.reduce((sum, habit) => sum + habit.remaining, 0);
      const dailyProgress = average(dailySeries.map((item) => item.percentage));
      const weeklyProgress = average(weekGroups.map((item) => item.percentage));
      const monthlyProgressRaw = totalGoals ? (totalCompleted / totalGoals) * 100 : 0;
      const monthlyProgress = clamp(monthlyProgressRaw, 0, 140);

      /*
        Momentum is a designed approximation.
        Formula:
        - 40% recent 7-day completion rate across all daily habits
        - 25% 7-day trend lift versus the prior 7 days
        - 35% streak health, based on average current streak against a 7-day benchmark
      */
      const recent7 = dailySeries.slice(-7);
      const previous7 = dailySeries.slice(-14, -7);
      const recentRate = average(recent7.map((item) => item.percentage));
      const previousRate = average(previous7.map((item) => item.percentage));
      const trendLift = clamp(50 + (recentRate - previousRate), 0, 100);
      const streakHealth = habitRows.length ? average(habitRows.map((habit) => clamp((habit.currentStreak / 7) * 100, 0, 100))) : 0;
      const momentum = (recentRate * 0.4) + (trendLift * 0.25) + (streakHealth * 0.35);

      const filteredRows = habitRows.filter((habit) => {
        if (state.ui.monthlyFilter === "below-goal") return habit.percentage < 100;
        if (state.ui.monthlyFilter === "over-goal") return habit.percentage > 100;
        if (state.ui.monthlyFilter === "streaking") return habit.currentStreak >= 3;
        return true;
      });

      const displayRows = [...filteredRows];
      if (state.ui.monthlySort === "progress") {
        displayRows.sort((a, b) => b.percentage - a.percentage || b.doneCount - a.doneCount);
      } else if (state.ui.monthlySort === "streak") {
        displayRows.sort((a, b) => b.currentStreak - a.currentStreak || b.percentage - a.percentage);
      } else {
        displayRows.sort((a, b) => a.index - b.index);
      }

      const topHabits = [...habitRows].sort((a, b) => b.percentage - a.percentage || b.doneCount - a.doneCount || a.name.localeCompare(b.name));
      const streakHabits = [...habitRows].sort((a, b) => b.currentStreak - a.currentStreak || b.longestStreak - a.longestStreak || b.percentage - a.percentage);

      return {
        monthKey,
        monthLabel: formatMonthLabel(monthKey),
        dates,
        weekGroups,
        habitRows,
        displayRows,
        topHabits,
        streakHabits,
        dailySeries,
        totalCompleted,
        totalGoals,
        totalRemaining,
        daysLeft,
        kpis: {
          momentum,
          dailyProgress,
          weeklyProgress,
          monthlyProgress,
          monthlyProgressRaw
        }
      };
    }

    function getWeeklyAnalytics(monthlyAnalytics) {
      const monthKey = state.selectedMonth;
      const monthData = getMonthData(monthKey);
      const weekGroups = monthlyAnalytics.weekGroups;
      const weekRows = weekGroups.map((group, weekIndex) => {
        const dailyCompleted = group.days.reduce((sum, date) => {
          const key = toDateKey(date);
          return sum + state.monthlyHabits.reduce((rowSum, habit) => rowSum + (monthData.dailyLogs[key] && monthData.dailyLogs[key][habit.id] ? 1 : 0), 0);
        }, 0);
        const dailyPossible = group.days.length * state.monthlyHabits.length;
        const weeklyTaskGoal = state.weeklyHabits.reduce((sum, habit) => sum + (monthData.weeklyPlans[habit.id] ? monthData.weeklyPlans[habit.id][weekIndex] || 0 : 0), 0);
        const weeklyTaskDone = state.weeklyHabits.reduce((sum, habit) => {
          const slots = monthData.weeklyChecks[habit.id] && monthData.weeklyChecks[habit.id][weekIndex] ? monthData.weeklyChecks[habit.id][weekIndex] : [];
          return sum + slots.filter(Boolean).length;
        }, 0);
        return {
          label: weekIndex < 4 ? `Week ${weekIndex + 1}` : "Extra Days",
          weekIndex,
          days: group.days,
          dailyCompleted,
          dailyPossible,
          dailyPercentage: dailyPossible ? (dailyCompleted / dailyPossible) * 100 : 0,
          weeklyTaskGoal,
          weeklyTaskDone,
          weeklyTaskRemaining: Math.max(weeklyTaskGoal - weeklyTaskDone, 0),
          weeklyTaskPercentage: weeklyTaskGoal ? (weeklyTaskDone / weeklyTaskGoal) * 100 : 0
        };
      });

      const habitRows = state.weeklyHabits.map((habit) => {
        const perWeek = weekRows.map((week) => {
          const target = monthData.weeklyPlans[habit.id] ? monthData.weeklyPlans[habit.id][week.weekIndex] || 0 : 0;
          const slots = monthData.weeklyChecks[habit.id] && monthData.weeklyChecks[habit.id][week.weekIndex] ? monthData.weeklyChecks[habit.id][week.weekIndex] : [];
          const done = slots.filter(Boolean).length;
          return {
            weekIndex: week.weekIndex,
            target,
            done,
            percentage: target ? (done / target) * 100 : 0,
            slots
          };
        });
        const totalTarget = perWeek.reduce((sum, item) => sum + item.target, 0);
        const totalDone = perWeek.reduce((sum, item) => sum + item.done, 0);
        return { ...habit, perWeek, totalTarget, totalDone, percentage: totalTarget ? (totalDone / totalTarget) * 100 : 0 };
      });

      const weeklyGoalTotal = habitRows.reduce((sum, habit) => sum + habit.totalTarget, 0);
      const weeklyCompletedTotal = habitRows.reduce((sum, habit) => sum + habit.totalDone, 0);
      const weeklyRemainingTotal = Math.max(weeklyGoalTotal - weeklyCompletedTotal, 0);
      const weeklyProgressPercent = weeklyGoalTotal ? (weeklyCompletedTotal / weeklyGoalTotal) * 100 : 0;
      const selectedWeek = weekRows[clampInteger(state.ui.selectedWeeklyFocus, 0, weekRows.length - 1)] || weekRows[0];

      return { weekRows, habitRows, weeklyGoalTotal, weeklyCompletedTotal, weeklyRemainingTotal, weeklyProgressPercent, selectedWeek };
    }

    function getMonthlyWeeklySubsystem(monthlyAnalytics, weeklyAnalytics) {

        weeklyCompletedTotal: activeWeeklyHabits.reduce((sum, habit) => sum + habit.totalDone, 0),
        weeklyRemainingTotal: activeWeeklyHabits.reduce((sum, habit) => sum + Math.max(habit.totalTarget - habit.totalDone, 0), 0),
        weeklyProgressPercent: activeWeeklyHabits.reduce((sum, habit) => sum + habit.totalTarget, 0)
          ? (activeWeeklyHabits.reduce((sum, habit) => sum + habit.totalDone, 0) / activeWeeklyHabits.reduce((sum, habit) => sum + habit.totalTarget, 0)) * 100
          : 0,
        notes: monthData.notes,

        taskWeeks: weeklyAnalytics.weekRows.map((week) => ({
          label: week.label,

    function getAnnualAnalytics() {
      const year = state.selectedYear;
      const yearData = getYearData(year);
      const monthKeys = Array.from({ length: 12 }, (_, monthIndex) => `${year}-${String(monthIndex + 1).padStart(2, "0")}`);
      const today = new Date();
      const currentYear = today.getFullYear();
      const currentMonthIndex = today.getMonth();
      const currentMonthKey = `${currentYear}-${String(currentMonthIndex + 1).padStart(2, "0")}`;
      const annualDaysLeft = year === currentYear
        ? Math.max(0, Math.ceil((new Date(year, 11, 31, 23, 59, 59) - today) / 86400000))
        : (year > currentYear ? Math.ceil((new Date(year, 11, 31, 23, 59, 59) - new Date(year, 0, 1)) / 86400000) : 0);

      const months = monthKeys.map((monthKey, monthIndex) => {
        const monthData = yearData.months[monthKey];
        const dates = getMonthDates(monthKey);
        const totalGoal = state.monthlyHabits.reduce((sum, habit) => sum + (monthData.monthlyGoals[habit.id] || 0), 0);
        const totalCompleted = dates.reduce((sum, date) => {
          const dateKey = toDateKey(date);
          return sum + state.monthlyHabits.reduce((rowSum, habit) => rowSum + (monthData.dailyLogs[dateKey] && monthData.dailyLogs[dateKey][habit.id] ? 1 : 0), 0);
        }, 0);
        const remaining = Math.max(totalGoal - totalCompleted, 0);
        const progress = totalGoal ? (totalCompleted / totalGoal) * 100 : 0;
        let daysLeft = 0;
        if (year > currentYear) daysLeft = dates.length;
        else if (year === currentYear && monthIndex === currentMonthIndex) daysLeft = Math.max(0, dates.length - today.getDate());
        return {
          monthKey,
          monthIndex,
          label: MONTH_SHORT[monthIndex],
          monthLabel: MONTH_NAMES[monthIndex],
          totalGoal,
          totalCompleted,
          remaining,
          progress,
          daysLeft
        };
      });

      const habitRows = state.monthlyHabits.map((habit, habitIndex) => {
        const monthlyBreakdown = months.map((month) => {
          const monthData = yearData.months[month.monthKey];
          const dates = getMonthDates(month.monthKey);
          const goal = monthData.monthlyGoals[habit.id] || 0;
          const completed = dates.reduce((sum, date) => {
            const dateKey = toDateKey(date);
            return sum + (monthData.dailyLogs[dateKey] && monthData.dailyLogs[dateKey][habit.id] ? 1 : 0);
          }, 0);
          return {
            monthIndex: month.monthIndex,
            monthKey: month.monthKey,
            label: month.label,
            goal,
            completed,
            remaining: Math.max(goal - completed, 0),
            percentage: goal ? (completed / goal) * 100 : 0,
            passed: completed >= goal
          };
        });
        const annualGoal = monthlyBreakdown.reduce((sum, item) => sum + item.goal, 0);
        const annualCompleted = monthlyBreakdown.reduce((sum, item) => sum + item.completed, 0);
        const annualRemaining = Math.max(annualGoal - annualCompleted, 0);
        const annualPercentage = annualGoal ? (annualCompleted / annualGoal) * 100 : 0;
        return {
          ...habit,
          habitIndex,
          monthlyBreakdown,
          annualGoal,
          annualCompleted,
          annualRemaining,
          annualPercentage
        };
      });

      const quarters = [0, 1, 2, 3].map((quarterIndex) => {
        const quarterMonths = months.slice(quarterIndex * 3, quarterIndex * 3 + 3);
        const goal = quarterMonths.reduce((sum, month) => sum + month.totalGoal, 0);
        const completed = quarterMonths.reduce((sum, month) => sum + month.totalCompleted, 0);
        return {
          quarterIndex,
          label: QUARTER_LABELS[quarterIndex],
          goal,
          completed,
          remaining: Math.max(goal - completed, 0),
          progress: goal ? (completed / goal) * 100 : 0
        };
      });

      const annualGoalTotal = months.reduce((sum, month) => sum + month.totalGoal, 0);
      const annualCompletedTotal = months.reduce((sum, month) => sum + month.totalCompleted, 0);
      const annualRemainingTotal = Math.max(annualGoalTotal - annualCompletedTotal, 0);
      const totalProgress = annualGoalTotal ? (annualCompletedTotal / annualGoalTotal) * 100 : 0;

      const activeMonth = months.find((month) => month.monthKey === state.selectedMonth) || months[today.getMonth()] || months[0];
      const activeQuarterIndex = Math.floor(activeMonth.monthIndex / 3);
      const activeQuarter = quarters[activeQuarterIndex];

      /*
        Annual momentum is a designed approximation.
        Formula:
        - 35% current month progress
        - 30% recent 3-month consistency average
        - 20% quarter progress
        - 15% annual streak health proxy, based on habits meeting or exceeding target in the selected month
      */
      const recentMonths = months.slice(Math.max(0, activeMonth.monthIndex - 2), activeMonth.monthIndex + 1);
      const recentConsistency = average(recentMonths.map((month) => month.progress));
      const annualStreakHealth = habitRows.length ? average(habitRows.map((habit) => {
        const activeBreakdown = habit.monthlyBreakdown[activeMonth.monthIndex];
        return activeBreakdown && activeBreakdown.passed ? 100 : clamp(activeBreakdown ? activeBreakdown.percentage : 0, 0, 100);
      })) : 0;
      const momentum = (activeMonth.progress * 0.35) + (recentConsistency * 0.3) + (activeQuarter.progress * 0.2) + (annualStreakHealth * 0.15);

      const rankedHabits = [...habitRows].sort((a, b) => b.annualPercentage - a.annualPercentage || b.annualCompleted - a.annualCompleted || a.name.localeCompare(b.name));

      const weeklyMonths = months.map((month) => {
        const monthData = yearData.months[month.monthKey];
        const goal = state.weeklyHabits.reduce((sum, habit) => sum + (monthData.weeklyPlans[habit.id] || []).reduce((acc, value) => acc + value, 0), 0);
        const completed = state.weeklyHabits.reduce((sum, habit) => sum + (monthData.weeklyChecks[habit.id] || []).reduce((acc, slots) => acc + slots.filter(Boolean).length, 0), 0);
        return {
          ...month,
          weeklyGoal: goal,
          weeklyCompleted: completed,
          weeklyRemaining: Math.max(goal - completed, 0),
          weeklyProgress: goal ? (completed / goal) * 100 : 0
        };
      });

      const weeklyHabitRows = state.weeklyHabits.map((habit) => {
        const monthlyBreakdown = weeklyMonths.map((month) => {
          const monthData = yearData.months[month.monthKey];
          const goal = (monthData.weeklyPlans[habit.id] || []).reduce((acc, value) => acc + value, 0);
          const completed = (monthData.weeklyChecks[habit.id] || []).reduce((acc, slots) => acc + slots.filter(Boolean).length, 0);
          return {
            monthIndex: month.monthIndex,
            monthKey: month.monthKey,
            goal,
            completed,
            remaining: Math.max(goal - completed, 0),
            percentage: goal ? (completed / goal) * 100 : 0
          };
        });
        const annualGoal = monthlyBreakdown.reduce((sum, item) => sum + item.goal, 0);
        const annualCompleted = monthlyBreakdown.reduce((sum, item) => sum + item.completed, 0);
        const annualRemaining = Math.max(annualGoal - annualCompleted, 0);
        return {
          ...habit,
          monthlyBreakdown,
          annualGoal,
          annualCompleted,
          annualRemaining,
          annualPercentage: annualGoal ? (annualCompleted / annualGoal) * 100 : 0
        };
      });

      const weeklyGoalTotal = weeklyHabitRows.reduce((sum, habit) => sum + habit.annualGoal, 0);
      const weeklyCompletedTotal = weeklyHabitRows.reduce((sum, habit) => sum + habit.annualCompleted, 0);
      const weeklyRemainingTotal = Math.max(weeklyGoalTotal - weeklyCompletedTotal, 0);
      const weeklyProgress = weeklyGoalTotal ? (weeklyCompletedTotal / weeklyGoalTotal) * 100 : 0;
      const rankedWeeklyHabits = [...weeklyHabitRows].sort((a, b) => b.annualCompleted - a.annualCompleted || b.annualPercentage - a.annualPercentage || a.name.localeCompare(b.name));
      const weeklyCompositionTotal = Math.max(weeklyCompletedTotal, 1);

      const dailyMonthlyTotals = months.map((month) => ({
        monthIndex: month.monthIndex,
        completed: month.totalCompleted,
        goal: month.totalGoal
      }));

      return {
        year,
        brandBadge: yearData.brandBadge,
        startLabel: `January 1, ${year}`,
        endLabel: `December 31, ${year}`,
        annualDaysLeft,
        totalHabits: state.monthlyHabits.length,
        annualGoalTotal,
        annualCompletedTotal,
        annualRemainingTotal,
        totalProgress,
        activeMonth,
        activeQuarter,
        momentum,
        months,
        dailyMonthlyTotals,
        quarters,
        habitRows,
        rankedHabits,
        weekly: {
          totalHabits: state.weeklyHabits.length,
          goalTotal: weeklyGoalTotal,
          completedTotal: weeklyCompletedTotal,
          remainingTotal: weeklyRemainingTotal,
          progress: weeklyProgress,
          months: weeklyMonths,
          rankedHabits: rankedWeeklyHabits,
          compositionTotal: weeklyCompositionTotal
        }
      };
    }

    function getDurationAnalytics() {
      const dates = getDateRange(state.durationStart, state.durationEnd);
      const safeDates = dates.length ? dates : getDateRange("2024-08-01", "2024-08-31");
      const startDate = safeDates[0];
      const endDate = safeDates[safeDates.length - 1];
      const today = new Date();
      const elapsedDays = safeDates.filter((date) => date <= today).length;
      const daysLeft = safeDates.filter((date) => date > today).length;
      const dateKeys = safeDates.map(toDateKey);

      const habitRows = state.monthlyHabits.map((habit, index) => {
        const completed = dateKeys.reduce((sum, key) => sum + (getDailyLogForDateKey(key)[habit.id] ? 1 : 0), 0);
        const goal = dateKeys.reduce((sum, key) => sum + (getMonthData(key.slice(0, 7)).monthlyGoals[habit.id] ? 1 : 0), 0);
        const effectiveGoal = Math.min(goal, safeDates.length);
        const remaining = Math.max(effectiveGoal - completed, 0);
        const percentage = effectiveGoal ? (completed / effectiveGoal) * 100 : 0;
        return {
          ...habit,
          index,
          completed,
          goal: effectiveGoal,
          remaining,
          percentage
        };
      });

      const dailySeries = safeDates.map((date) => {
        const key = toDateKey(date);
        const completed = state.monthlyHabits.reduce((sum, habit) => sum + (getDailyLogForDateKey(key)[habit.id] ? 1 : 0), 0);
        return {
          date,
          dateKey: key,
          completed,
          percentage: state.monthlyHabits.length ? (completed / state.monthlyHabits.length) * 100 : 0
        };
      });

      const totalCompleted = habitRows.reduce((sum, habit) => sum + habit.completed, 0);
      const totalGoals = habitRows.reduce((sum, habit) => sum + habit.goal, 0);
      const totalRemaining = habitRows.reduce((sum, habit) => sum + habit.remaining, 0);
      const progress = totalGoals ? (totalCompleted / totalGoals) * 100 : 0;
      const recent7 = dailySeries.slice(-7);
      const previous7 = dailySeries.slice(-14, -7);
      const momentum = (average(recent7.map((item) => item.percentage)) * 0.65) + (clamp(50 + (average(recent7.map((item) => item.percentage)) - average(previous7.map((item) => item.percentage))), 0, 100) * 0.35);
      const rankedHabits = [...habitRows].sort((a, b) => b.percentage - a.percentage || b.completed - a.completed);
      const compact = safeDates.length <= 45;
      const chunks = compact ? [] : chunkDatesByWeek(safeDates);

      return {
        startDate,
        endDate,
        dates: safeDates,
        totalDays: safeDates.length,
        elapsedDays,
        daysLeft,
        totalCompleted,
        totalGoals,
        totalRemaining,
        progress,
        momentum,
        habitRows,
        rankedHabits,
        dailySeries,
        compact,
        chunks
      };
    }

    function chunkDatesByWeek(dates) {
      const groups = [];
      let current = [];
      dates.forEach((date, index) => {
        current.push(date);
        if (current.length === 7 || index === dates.length - 1) {
          groups.push(current);
          current = [];
        }
      });
      return groups;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

                <div class="formula-item"><strong>Needs tiny companion files:</strong> PWA install metadata and offline app-shell caching require <code>manifest.json</code> and <code>sw.js</code>, plus icon files.</div>

            <div class="panel-body">

              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-body">
              <div class="panel-header">
                <div>
                  <span class="eyebrow">PWA</span>
                  <h3>Installability + Offline Shell</h3>
                </div>
              </div>
              <div class="formula-list">

                <div class="formula-item"><strong>Offline:</strong> the main dashboard shell and icons are cached for fast repeat loads. Dynamic backup files are still user-managed JSON exports.</div>
                <div class="formula-item"><strong>Sync-ready structure:</strong> a future Firebase config can be added to state without changing the single-file UI architecture.</div>
              </div>

            <div class="panel-body">

            </div>
          </section>
        </div>

    function renderRingCard(title, rawValue, color, description) {

      const gradientId = `ring-${title.toLowerCase().replace(/[^a-z0-9]+/g, "-")}`;
      return `
        <div class="kpi-card">
          <div>
            <h3>${title}</h3>
            <p>${description}</p>
          </div>
          <div class="ring-wrap">
            <svg viewBox="0 0 112 112" aria-hidden="true">
              <defs>
                <linearGradient id="${gradientId}" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="${color}"></stop>
                  <stop offset="100%" stop-color="#f3f7ff"></stop>
                </linearGradient>
              </defs>
              <circle cx="56" cy="56" r="${radius}" fill="none" stroke="rgba(101,142,191,0.16)" stroke-width="10"></circle>
              <circle cx="56" cy="56" r="${radius}" fill="none" stroke="url(#${gradientId})" stroke-width="10" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}" transform="rotate(-90 56 56)"></circle>
            </svg>
            <div class="ring-center">

    function renderDailyTrendChart(series, habitCount) {
      const width = 940;
      const height = 260;
      const padX = 20;
      const chartTop = 18;
      const chartHeight = 180;
      const baseline = chartTop + chartHeight;
      const maxValue = Math.max(habitCount, ...series.map((item) => item.completed), 1);
      const stepX = series.length > 1 ? (width - padX * 2) / (series.length - 1) : 0;
      const points = series.map((item, index) => {
        const x = padX + stepX * index;
        const y = baseline - (item.completed / maxValue) * chartHeight;
        return { ...item, x, y };
      });
      const linePath = points.map((point, index) => `${index ? "L" : "M"}${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(" ");
      const areaPath = `${linePath} L ${points[points.length - 1].x.toFixed(2)} ${baseline} L ${points[0].x.toFixed(2)} ${baseline} Z`;
      return `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Daily progress chart">
          <defs>
            <linearGradient id="dailyArea" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="rgba(83,216,251,0.42)"></stop>
              <stop offset="100%" stop-color="rgba(83,216,251,0.02)"></stop>
            </linearGradient>
          </defs>
          ${Array.from({ length: maxValue + 1 }, (_, value) => value)
            .filter((value) => value === 0 || value === maxValue || value === Math.round(maxValue / 2))
            .map((value) => {
              const y = baseline - (value / maxValue) * chartHeight;
              return `<line x1="${padX}" y1="${y}" x2="${width - padX}" y2="${y}" stroke="rgba(145,188,247,0.12)" stroke-dasharray="4 7"></line>
                <text x="2" y="${y + 4}" fill="rgba(143,169,201,0.72)" font-size="11">${value}</text>`;
            }).join("")}
          <path d="${areaPath}" fill="url(#dailyArea)"></path>
          <path d="${linePath}" fill="none" stroke="var(--cyan)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
          ${points.map((point) => `<circle cx="${point.x}" cy="${point.y}" r="4.5" fill="#04101f" stroke="var(--cyan)" stroke-width="2"></circle>`).join("")}
          ${points.filter((_, index) => index === 0 || index === points.length - 1 || index % 4 === 0).map((point) => `
            <text x="${point.x}" y="${baseline + 22}" text-anchor="middle" fill="rgba(143,169,201,0.8)" font-size="11">${point.date.getDate()}</text>
          `).join("")}
        </svg>
      `;
    }

              return `<line x1="${padX}" y1="${y}" x2="${width - padX}" y2="${y}" stroke="rgba(145,188,247,0.12)" stroke-dasharray="4 7"></line>
