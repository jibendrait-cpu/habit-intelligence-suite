          color: monthWeekColors[week.weekIndex],
          tasks: week.tasks.map((task) => ({
            ...task,
            slots: [task.done],
            goal: 1,
            completed: task.done ? 1 : 0
          }))
        }));

        const totalDailyCompleted = demoWeekRows.reduce((sum, week) => sum + week.dailyCompleted, 0);
        const totalDailyPossible = demoWeekRows.reduce((sum, week) => sum + week.dailyPossible, 0);

        return {
          carryHabit: {
            name: "Sleep by 11pm",
            goal: 24,
            doneCount: 18,
            percentage: 75,
            currentStreak: 1
          },
          carryDates,
          carryChecks,
          activeWeeklyHabits: [
            { name: "Meal prep" },
            { name: "Laundry" },
            { name: "Budget" },
            { name: "Clean the garage" },
            { name: "Clean the car" }
          ],
          activeWeeklyCount: 5,
          weeklyGoalTotal: 12,
          weeklyCompletedTotal: 9,
          weeklyRemainingTotal: 3,
          weeklyProgressPercent: 75,
          dailyProgressPercent: totalDailyPossible ? (totalDailyCompleted / totalDailyPossible) * 100 : 0,
          notes: monthData.notes,
          displayWeekRows: demoWeekRows,
          taskWeeks
        };
      }

      const carryHabit = monthlyAnalytics.habitRows.find((habit) => habit.id === "sleep") || monthlyAnalytics.habitRows[0];
      const displayWeekRows = weeklyAnalytics.weekRows.map((week) => {
        const dailyItems = monthlyAnalytics.dailySeries.filter((item) => item.weekIndex === week.weekIndex);
        return {
          ...week,
          dailyValues: dailyItems.map((item) => item.completed),
          color: monthWeekColors[week.weekIndex]
        };
      });
      const taskWeeks = weeklyAnalytics.weekRows.map((week) => ({
        label: week.label,
        weekIndex: week.weekIndex,
        dateRangeLabel: week.dateRangeLabel,
        completed: week.weeklyTaskDone,
        goal: week.weeklyTaskGoal,
        percentage: week.weeklyTaskGoal ? Math.round((week.weeklyTaskDone / week.weeklyTaskGoal) * 100) : 0,
        color: monthWeekColors[week.weekIndex],
        tasks: activeWeeklyHabits
          .map((habit) => ({
            name: habit.name,
            data: habit.perWeek.find((item) => item.weekIndex === week.weekIndex),
            habit
          }))
          .filter((entry) => entry.data && entry.data.target > 0)
          .map((entry) => ({
            name: entry.name,
            slots: entry.data.slots,
            done: entry.data.done > 0,
            completed: entry.data.done,
            goal: entry.data.target,
            habitId: entry.habit.id
          }))
      }));

      const totalDailyCompleted = displayWeekRows.reduce((sum, week) => sum + week.dailyCompleted, 0);
      const totalDailyPossible = displayWeekRows.reduce((sum, week) => sum + week.dailyPossible, 0);

      return {
        carryHabit,
        carryDates,
        carryChecks: carryHabit
          ? carryDates.map((date) => {
            const key = toDateKey(date);
            return !!(monthData.dailyLogs[key] && monthData.dailyLogs[key][carryHabit.id]);
          })
          : [],
        activeWeeklyHabits,
        activeWeeklyCount: activeCount,
        weeklyGoalTotal: activeWeeklyHabits.reduce((sum, habit) => sum + habit.totalTarget, 0),
        weeklyCompletedTotal: activeWeeklyHabits.reduce((sum, habit) => sum + habit.totalDone, 0),
        weeklyRemainingTotal: activeWeeklyHabits.reduce((sum, habit) => sum + Math.max(habit.totalTarget - habit.totalDone, 0), 0),
        weeklyProgressPercent: activeWeeklyHabits.reduce((sum, habit) => sum + habit.totalTarget, 0)
          ? (activeWeeklyHabits.reduce((sum, habit) => sum + habit.totalDone, 0) / activeWeeklyHabits.reduce((sum, habit) => sum + habit.totalTarget, 0)) * 100
          : 0,
        dailyProgressPercent: totalDailyPossible ? (totalDailyCompleted / totalDailyPossible) * 100 : 0,
        notes: monthData.notes,
        displayWeekRows,
        taskWeeks
      };
    }

    function getAnnualAnalytics() {
      const year = state.selectedYear;
      const yearData = getYearData(year);
      const monthKeys = Array.from({ length: 12 }, (_, monthIndex) => `${year}-${String(monthIndex + 1).padStart(2, "0")}`);
      const today = new Date();
      const currentYear = today.getFullYear();
      const currentMonthIndex = today.getMonth();
      const currentMonthKey = `${currentYear}-${String(currentMonthIndex + 1).padStart(2, "0")}`;
      const annualDaysLeft = year === currentYear
        ? Math.max(0, Math.ceil((new Date(year, 11, 31, 23, 59, 59) - today) / 86400000))
        : (year > currentYear ? Math.ceil((new Date(year, 11, 31, 23, 59, 59) - new Date(year, 0, 1)) / 86400000) : 0);

      const months = monthKeys.map((monthKey, monthIndex) => {
        const monthData = yearData.months[monthKey];
        const dates = getMonthDates(monthKey);
        const totalGoal = state.monthlyHabits.reduce((sum, habit) => sum + (monthData.monthlyGoals[habit.id] || 0), 0);
        const totalCompleted = dates.reduce((sum, date) => {
          const dateKey = toDateKey(date);
          return sum + state.monthlyHabits.reduce((rowSum, habit) => rowSum + (monthData.dailyLogs[dateKey] && monthData.dailyLogs[dateKey][habit.id] ? 1 : 0), 0);
        }, 0);
        const remaining = Math.max(totalGoal - totalCompleted, 0);
        const progress = totalGoal ? (totalCompleted / totalGoal) * 100 : 0;
        let daysLeft = 0;
        if (year > currentYear) daysLeft = dates.length;
        else if (year === currentYear && monthIndex === currentMonthIndex) daysLeft = Math.max(0, dates.length - today.getDate());
        return {
          monthKey,
          monthIndex,
          label: MONTH_SHORT[monthIndex],
          monthLabel: MONTH_NAMES[monthIndex],
          dualLabel: formatAdMonthLabel(year, monthIndex, true),
          bsSpan: getBsMonthSpanForAdMonth(year, monthIndex, true),
          totalGoal,
          totalCompleted,
          remaining,
          progress,
          daysLeft
        };
      });

      const habitRows = state.monthlyHabits.map((habit, habitIndex) => {
        const monthlyBreakdown = months.map((month) => {
          const monthData = yearData.months[month.monthKey];
          const dates = getMonthDates(month.monthKey);
          const goal = monthData.monthlyGoals[habit.id] || 0;
          const completed = dates.reduce((sum, date) => {
            const dateKey = toDateKey(date);
            return sum + (monthData.dailyLogs[dateKey] && monthData.dailyLogs[dateKey][habit.id] ? 1 : 0);
          }, 0);
          return {
            monthIndex: month.monthIndex,
            monthKey: month.monthKey,
            label: month.label,
            goal,
            completed,
            remaining: Math.max(goal - completed, 0),
            percentage: goal ? (completed / goal) * 100 : 0,
            passed: completed >= goal
          };
        });
        const annualGoal = monthlyBreakdown.reduce((sum, item) => sum + item.goal, 0);
        const annualCompleted = monthlyBreakdown.reduce((sum, item) => sum + item.completed, 0);
        const annualRemaining = Math.max(annualGoal - annualCompleted, 0);
        const annualPercentage = annualGoal ? (annualCompleted / annualGoal) * 100 : 0;
        return {
          ...habit,
          habitIndex,
          monthlyBreakdown,
          annualGoal,
          annualCompleted,
          annualRemaining,
          annualPercentage
        };
      });

      const quarters = [0, 1, 2, 3].map((quarterIndex) => {
        const quarterMonths = months.slice(quarterIndex * 3, quarterIndex * 3 + 3);
        const goal = quarterMonths.reduce((sum, month) => sum + month.totalGoal, 0);
        const completed = quarterMonths.reduce((sum, month) => sum + month.totalCompleted, 0);
        return {
          quarterIndex,
          label: QUARTER_LABELS[quarterIndex],
          goal,
          completed,
          remaining: Math.max(goal - completed, 0),
          progress: goal ? (completed / goal) * 100 : 0
        };
      });

      const annualGoalTotal = months.reduce((sum, month) => sum + month.totalGoal, 0);
      const annualCompletedTotal = months.reduce((sum, month) => sum + month.totalCompleted, 0);
      const annualRemainingTotal = Math.max(annualGoalTotal - annualCompletedTotal, 0);
      const totalProgress = annualGoalTotal ? (annualCompletedTotal / annualGoalTotal) * 100 : 0;

      const activeMonth = months.find((month) => month.monthKey === state.selectedMonth) || months[today.getMonth()] || months[0];
      const activeQuarterIndex = Math.floor(activeMonth.monthIndex / 3);
      const activeQuarter = quarters[activeQuarterIndex];

      /*
        Annual momentum is a designed approximation.
        Formula:
        - 35% current month progress
        - 30% recent 3-month consistency average
        - 20% quarter progress
        - 15% annual streak health proxy, based on habits meeting or exceeding target in the selected month
      */
      const recentMonths = months.slice(Math.max(0, activeMonth.monthIndex - 2), activeMonth.monthIndex + 1);
      const recentConsistency = average(recentMonths.map((month) => month.progress));
      const annualStreakHealth = habitRows.length ? average(habitRows.map((habit) => {
        const activeBreakdown = habit.monthlyBreakdown[activeMonth.monthIndex];
        return activeBreakdown && activeBreakdown.passed ? 100 : clamp(activeBreakdown ? activeBreakdown.percentage : 0, 0, 100);
      })) : 0;
      const momentum = (activeMonth.progress * 0.35) + (recentConsistency * 0.3) + (activeQuarter.progress * 0.2) + (annualStreakHealth * 0.15);

      const rankedHabits = [...habitRows].sort((a, b) => b.annualPercentage - a.annualPercentage || b.annualCompleted - a.annualCompleted || a.name.localeCompare(b.name));

      const weeklyMonths = months.map((month) => {
        const monthData = yearData.months[month.monthKey];
        const goal = state.weeklyHabits.reduce((sum, habit) => sum + (monthData.weeklyPlans[habit.id] || []).reduce((acc, value) => acc + value, 0), 0);
        const completed = state.weeklyHabits.reduce((sum, habit) => sum + (monthData.weeklyChecks[habit.id] || []).reduce((acc, slots) => acc + slots.filter(Boolean).length, 0), 0);
        return {
          ...month,
          weeklyGoal: goal,
          weeklyCompleted: completed,
          weeklyRemaining: Math.max(goal - completed, 0),
          weeklyProgress: goal ? (completed / goal) * 100 : 0
        };
      });

      const weeklyHabitRows = state.weeklyHabits.map((habit) => {
        const monthlyBreakdown = weeklyMonths.map((month) => {
          const monthData = yearData.months[month.monthKey];
          const goal = (monthData.weeklyPlans[habit.id] || []).reduce((acc, value) => acc + value, 0);
          const completed = (monthData.weeklyChecks[habit.id] || []).reduce((acc, slots) => acc + slots.filter(Boolean).length, 0);
          return {
            monthIndex: month.monthIndex,
            monthKey: month.monthKey,
            label: month.label,
            goal,
            completed,
            remaining: Math.max(goal - completed, 0),
            percentage: goal ? (completed / goal) * 100 : 0
          };
        });
        const annualGoal = monthlyBreakdown.reduce((sum, item) => sum + item.goal, 0);
        const annualCompleted = monthlyBreakdown.reduce((sum, item) => sum + item.completed, 0);
        const annualRemaining = Math.max(annualGoal - annualCompleted, 0);
        return {
          ...habit,
          type: "weekly",
          monthlyBreakdown,
          monthlyGoals: monthlyBreakdown.map((item) => item.goal),
          monthlyCompleted: monthlyBreakdown.map((item) => item.completed),
          annualGoal,
          annualCompleted,
          annualRemaining,
          annualPercentage: annualGoal ? (annualCompleted / annualGoal) * 100 : 0
        };
      });

      const weeklySource = year === 2024
        ? buildAnnualWeeklyDemoAnalytics(year, months)
        : buildAnnualWeeklyAnalyticsFromRows(weeklyMonths, weeklyHabitRows);

      const dailyMonthlyTotals = months.map((month) => ({
        monthIndex: month.monthIndex,
        completed: month.totalCompleted,
        goal: month.totalGoal
      }));

      return {
        year,
        brandBadge: yearData.brandBadge,
        startLabel: `January 1, ${year}`,
        endLabel: `December 31, ${year}`,
        annualDaysLeft,
        totalHabits: state.monthlyHabits.length,
        annualGoalTotal,
        annualCompletedTotal,
        annualRemainingTotal,
        totalProgress,
        activeMonth,
        activeQuarter,
        momentum,
        months,
        dailyMonthlyTotals,
        quarters,
        habitRows: habitRows.map((habit) => ({
          ...habit,
          type: "daily",
          annualTotal: habit.annualCompleted
        })),
        rankedHabits,
        weekly: {
          ...weeklySource,
          totalHabits: weeklySource.totalHabits,
          goalTotal: weeklySource.goalTotal,
          completedTotal: weeklySource.completedTotal,
          remainingTotal: weeklySource.remainingTotal,
          progress: weeklySource.progress,
          months: weeklySource.months,
          rankedHabits: weeklySource.rankedHabits,
          compositionTotal: weeklySource.compositionTotal
        }
      };
    }

    function buildAnnualWeeklyAnalyticsFromRows(weeklyMonths, weeklyHabitRows) {
      const weeklyGoalTotal = weeklyHabitRows.reduce((sum, habit) => sum + habit.annualGoal, 0);
      const weeklyCompletedTotal = weeklyHabitRows.reduce((sum, habit) => sum + habit.annualCompleted, 0);
      const weeklyRemainingTotal = Math.max(weeklyGoalTotal - weeklyCompletedTotal, 0);
      const weeklyProgress = weeklyGoalTotal ? (weeklyCompletedTotal / weeklyGoalTotal) * 100 : 0;
      const rankedWeeklyHabits = [...weeklyHabitRows].sort((a, b) => b.annualCompleted - a.annualCompleted || b.annualPercentage - a.annualPercentage || a.name.localeCompare(b.name));
      return {
        totalHabits: weeklyHabitRows.length,
        goalTotal: weeklyGoalTotal,
        completedTotal: weeklyCompletedTotal,
        remainingTotal: weeklyRemainingTotal,
        progress: weeklyProgress,
        months: weeklyMonths.map((month) => ({
          ...month,
          label: month.label
        })),
        rankedHabits: rankedWeeklyHabits,
        compositionTotal: Math.max(weeklyCompletedTotal, 1)
      };
    }

    function getPlannerAnalytics() {
      const year = state.selectedYear;
      const planner = getPlannerData(year);
      const capacities = getPlannerMonthCapacities(planner.startDate, planner.endDate);
      const habitRows = state.monthlyHabits
        .filter((habit) => habit.active !== false)
        .sort((a, b) => a.orderIndex - b.orderIndex)
        .map((habit, rowIndex) => {
          const targets = MONTH_NAMES.map((_, monthIndex) => clampInteger((planner.monthlyTargets[habit.id] || [])[monthIndex] ?? 0, 0, capacities[monthIndex].daysAvailable));
          return {
            ...habit,
            rowIndex,
            targets,
            annualTotal: targets.reduce((sum, value) => sum + value, 0)
          };
        });
      const monthlyTotals = MONTH_NAMES.map((_, monthIndex) => ({
        monthIndex,
        label: MONTH_NAMES[monthIndex],
        shortLabel: MONTH_SHORT[monthIndex],
        total: habitRows.reduce((sum, habit) => sum + habit.targets[monthIndex], 0),
        daysAvailable: capacities[monthIndex].daysAvailable,
        totalDays: capacities[monthIndex].totalDays
      }));
      return {
        year,
        startDate: planner.startDate,
        endDate: planner.endDate,
        daysLeft: getDateRange(planner.startDate, planner.endDate).length,
        streakCarryOver: planner.streakCarryOver,
        capacities,
        habitRows,
        monthlyTotals,
        grandTotal: monthlyTotals.reduce((sum, month) => sum + month.total, 0),
        monthMax: Math.max(...monthlyTotals.map((month) => month.total), 1)
      };
    }

    function getDurationAnalytics() {
      const dates = getDateRange(state.durationStart, state.durationEnd);
      const safeDates = dates.length ? dates : getDateRange("2024-08-01", "2024-08-31");
      const startDate = safeDates[0];
      const endDate = safeDates[safeDates.length - 1];
      const today = new Date();
      const elapsedDays = safeDates.filter((date) => date <= today).length;
      const daysLeft = safeDates.filter((date) => date > today).length;
      const monthGoalCache = {};
      const dateEntries = safeDates.map((date) => {
        const dateKey = toDateKey(date);
        const monthKey = dateKey.slice(0, 7);
        const monthData = getMonthData(monthKey);
        if (!monthGoalCache[monthKey]) monthGoalCache[monthKey] = monthData.monthlyGoals;
        return {
          date,
          dateKey,
          monthKey,
          log: monthData.dailyLogs[dateKey] || {}
        };
      });

      const habitRows = state.monthlyHabits.map((habit, index) => {
        const completed = dateEntries.reduce((sum, entry) => sum + (entry.log[habit.id] ? 1 : 0), 0);
        const goal = dateEntries.reduce((sum, entry) => sum + (monthGoalCache[entry.monthKey][habit.id] ? 1 : 0), 0);
        const effectiveGoal = goal;
        const remaining = Math.max(effectiveGoal - completed, 0);
        const percentage = effectiveGoal ? (completed / effectiveGoal) * 100 : 0;
        return {
          ...habit,
          index,
          completed,
          goal: effectiveGoal,
          remaining,
          percentage
        };
      });

      const dailySeries = dateEntries.map((entry) => {
        const completed = state.monthlyHabits.reduce((sum, habit) => sum + (entry.log[habit.id] ? 1 : 0), 0);
        return {
          date: entry.date,
          dateKey: entry.dateKey,
          completed,
          percentage: state.monthlyHabits.length ? (completed / state.monthlyHabits.length) * 100 : 0
        };
      });

      const totalCompleted = habitRows.reduce((sum, habit) => sum + habit.completed, 0);
      const totalGoals = habitRows.reduce((sum, habit) => sum + habit.goal, 0);
      const totalRemaining = habitRows.reduce((sum, habit) => sum + habit.remaining, 0);
      const progress = totalGoals ? (totalCompleted / totalGoals) * 100 : 0;
      const recent7 = dailySeries.slice(-7);
      const previous7 = dailySeries.slice(-14, -7);
      const momentum = (average(recent7.map((item) => item.percentage)) * 0.65) + (clamp(50 + (average(recent7.map((item) => item.percentage)) - average(previous7.map((item) => item.percentage))), 0, 100) * 0.35);
      const rankedHabits = [...habitRows].sort((a, b) => b.percentage - a.percentage || b.completed - a.completed);
      const compact = safeDates.length <= 45;
      const chunks = compact ? [] : chunkDatesByWeek(safeDates);
      const dateLogByKey = Object.fromEntries(dateEntries.map((entry) => [entry.dateKey, entry.log]));
      const chunkSummaries = compact ? [] : chunks.map((chunk) => {
        const chunkDateKeys = chunk.map(toDateKey);
        const perHabit = Object.fromEntries(state.monthlyHabits.map((habit) => ([
          habit.id,
          chunkDateKeys.reduce((sum, key) => sum + (dateLogByKey[key] && dateLogByKey[key][habit.id] ? 1 : 0), 0)
        ])));
        return {
          chunk,
          chunkDateKeys,
          perHabit
        };
      });

      return {
        startDate,
        endDate,
        dates: safeDates,
        dateEntries,
        dateLogByKey,
        totalDays: safeDates.length,
        elapsedDays,
        daysLeft,
        totalCompleted,
        totalGoals,
        totalRemaining,
        progress,
        momentum,
        habitRows,
        rankedHabits,
        dailySeries,
        compact,
        chunks,
        chunkSummaries
      };
    }

    function chunkDatesByWeek(dates) {
      const groups = [];
      let current = [];
      dates.forEach((date, index) => {
        current.push(date);
        if (current.length === 7 || index === dates.length - 1) {
          groups.push(current);
          current = [];
        }
      });
      return groups;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

                        <input class="mini-input" type="text" value="${escapeHtml(habit.name)}" data-change="weekly-name" data-id="${habit.id}">
                      </div>
                      ${monthData.weeklyPlans[habit.id].map((target, weekIndex) => `
                        <input class="mini-input" type="number" min="0" max="6" value="${target}" data-change="weekly-target" data-id="${habit.id}" data-week-index="${weekIndex}" title="${weekIndex < 4 ? `Week ${weekIndex + 1}` : "Extra Days"}">
                      `).join("")}
                      <button class="button tiny danger" data-action="delete-weekly-habit" data-id="${habit.id}">Delete</button>
                    </div>
                  `).join("")}
                </div>
              </div>
            </section>
          </div>

          <div class="column">
            ${renderSetupDetailPanel(selectedHabit, selectedMonthlyRow)}
          </div>
        </div>
      `;
    }

    function renderRingCard(title, rawValue, color, description) {
      const normalized = Math.min(rawValue, 100);
      const radius = 44;
      const circumference = 2 * Math.PI * radius;
      const dashOffset = circumference - (normalized / 100) * circumference;
      const gradientId = `ring-${title.toLowerCase().replace(/[^a-z0-9]+/g, "-")}`;
      return `
        <div class="kpi-card">
          <div>
            <h3>${title}</h3>
            <p>${description}</p>
          </div>
          <div class="ring-wrap">
            <svg viewBox="0 0 112 112" aria-hidden="true">
              <defs>
                <linearGradient id="${gradientId}" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="${color}"></stop>
                  <stop offset="100%" stop-color="#f3f7ff"></stop>
                </linearGradient>
              </defs>
              <circle cx="56" cy="56" r="${radius}" fill="none" stroke="rgba(101,142,191,0.16)" stroke-width="10"></circle>
              <circle cx="56" cy="56" r="${radius}" fill="none" stroke="url(#${gradientId})" stroke-width="10" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}" transform="rotate(-90 56 56)"></circle>
            </svg>
            <div class="ring-center">
              <div>
                <strong>${rawValue.toFixed(0)}%</strong>
                <span>${rawValue > 100 ? "over" : "live"}</span>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderDonutChart(rawValue, color, label) {
      const normalized = Math.min(rawValue, 100);
      const radius = 58;
      const circumference = 2 * Math.PI * radius;
      const dashOffset = circumference - (normalized / 100) * circumference;
      return `
        <div class="ring-wrap" style="width:220px;height:220px">
          <svg viewBox="0 0 220 220" aria-hidden="true">
            <circle cx="110" cy="110" r="${radius}" fill="none" stroke="rgba(101,142,191,0.16)" stroke-width="16"></circle>
            <circle cx="110" cy="110" r="${radius}" fill="none" stroke="${color}" stroke-width="16" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}" transform="rotate(-90 110 110)"></circle>
          </svg>
          <div class="ring-center">
            <div>
              <strong>${rawValue.toFixed(0)}%</strong>
              <span>${label}</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderDailyTrendChart(series, habitCount) {
      const width = 940;
      const height = 260;
      const padX = 20;
      const chartTop = 18;
      const chartHeight = 180;
      const baseline = chartTop + chartHeight;
      const maxValue = Math.max(habitCount, ...series.map((item) => item.completed), 1);
      const stepX = series.length > 1 ? (width - padX * 2) / (series.length - 1) : 0;
      const points = series.map((item, index) => {
        const x = padX + stepX * index;
        const y = baseline - (item.completed / maxValue) * chartHeight;
        return { ...item, x, y };
      });
      const linePath = points.map((point, index) => `${index ? "L" : "M"}${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(" ");
      const areaPath = `${linePath} L ${points[points.length - 1].x.toFixed(2)} ${baseline} L ${points[0].x.toFixed(2)} ${baseline} Z`;
      return `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Daily progress chart">
          <defs>
            <linearGradient id="dailyArea" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="rgba(83,216,251,0.42)"></stop>
              <stop offset="100%" stop-color="rgba(83,216,251,0.02)"></stop>
            </linearGradient>
          </defs>
          ${Array.from({ length: maxValue + 1 }, (_, value) => value)
            .filter((value) => value === 0 || value === maxValue || value === Math.round(maxValue / 2))
            .map((value) => {
              const y = baseline - (value / maxValue) * chartHeight;
              return `<line x1="${padX}" y1="${y}" x2="${width - padX}" y2="${y}" stroke="rgba(145,188,247,0.12)" stroke-dasharray="4 7"></line>
                <text x="2" y="${y + 4}" fill="rgba(143,169,201,0.72)" font-size="11">${value}</text>`;
            }).join("")}
          <path d="${areaPath}" fill="url(#dailyArea)"></path>
          <path d="${linePath}" fill="none" stroke="var(--cyan)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
          ${points.map((point) => `<circle cx="${point.x}" cy="${point.y}" r="4.5" fill="#04101f" stroke="var(--cyan)" stroke-width="2"><title>${formatDualExactDate(point.date)} • ${point.completed}</title></circle>`).join("")}
          ${points.filter((_, index) => index === 0 || index === points.length - 1 || index % 4 === 0).map((point) => `
            <text x="${point.x}" y="${baseline + 22}" text-anchor="middle" fill="rgba(143,169,201,0.8)" font-size="11">${point.date.getDate()}</text>
          `).join("")}
        </svg>
      `;
    }

    function renderWeeklyDailyBars(series, habitCount) {
      const width = 940;
      const height = 280;
      const padX = 18;
      const chartTop = 18;
      const chartHeight = 188;
      const baseline = chartTop + chartHeight;
      const barWidth = Math.max(12, (width - padX * 2) / (series.length * 1.4));
      const stepX = (width - padX * 2) / series.length;
      return `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Weekly daily bar chart">
          ${Array.from({ length: habitCount + 1 }, (_, value) => value)
            .filter((value) => value === 0 || value === habitCount || value === Math.round(habitCount / 2))
            .map((value) => {
              const y = baseline - (value / Math.max(habitCount, 1)) * chartHeight;
              return `<line x1="${padX}" y1="${y}" x2="${width - padX}" y2="${y}" stroke="rgba(145,188,247,0.12)" stroke-dasharray="4 7"></line>
                <text x="2" y="${y + 4}" fill="rgba(143,169,201,0.72)" font-size="11">${value}</text>`;
            }).join("")}
          ${series.map((item, index) => {
            const x = padX + (stepX * index) + (stepX - barWidth) / 2;
            const barHeight = (item.completed / Math.max(habitCount, 1)) * chartHeight;
            const y = baseline - barHeight;
            const color = ["var(--week-1)", "var(--week-2)", "var(--week-3)", "var(--week-4)", "var(--week-5)"][item.weekIndex];
            return `
              <rect x="${x}" y="${y}" width="${barWidth}" height="${barHeight}" rx="8" fill="${color}" opacity="0.9"><title>${formatDualExactDate(item.date)} • ${item.completed}</title></rect>
              <text x="${x + barWidth / 2}" y="${y - 6}" text-anchor="middle" fill="${color}" font-size="11">${item.completed}</text>
              ${index % 2 === 0 || index === series.length - 1 ? `<text x="${x + barWidth / 2}" y="${baseline + 18}" text-anchor="middle" fill="rgba(143,169,201,0.76)" font-size="11">${item.date.getDate()}</text>` : ""}
            `;
          }).join("")}
        </svg>
      `;
    }

    function renderAnnualOverviewChart(annual) {
      const width = 1020;
      const height = 320;
      const padLeft = 26;
      const padRight = 20;
      const chartTop = 22;
      const chartHeight = 214;
      const baseline = chartTop + chartHeight;
      const maxValue = Math.max(
        1,
        ...annual.months.map((month) => month.totalGoal),
        ...annual.months.map((month) => month.totalCompleted),
        ...annual.months.map((month) => month.remaining)
      );
      const stepX = (width - padLeft - padRight) / annual.months.length;
      const barWidth = Math.min(34, stepX * 0.48);
      const goalPoints = annual.months.map((month, index) => {
        const x = padLeft + stepX * index + stepX / 2;
        const y = baseline - (month.totalGoal / maxValue) * chartHeight;
        return { x, y, month };
      });
      const remainingPoints = annual.months.map((month, index) => {
        const x = padLeft + stepX * index + stepX / 2;
        const y = baseline - (month.remaining / maxValue) * chartHeight;
        return { x, y, month };
      });
      const goalPath = goalPoints.map((point, index) => `${index ? "L" : "M"}${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(" ");
      const remainingPath = remainingPoints.map((point, index) => `${index ? "L" : "M"}${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(" ");

      return `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Annual progress overview">
          ${Array.from({ length: 5 }, (_, index) => index).map((index) => {
            const value = Math.round((maxValue / 4) * index);
            const y = baseline - (value / maxValue) * chartHeight;
            return `<line x1="${padLeft}" y1="${y}" x2="${width - padRight}" y2="${y}" stroke="rgba(145,188,247,0.12)" stroke-dasharray="4 7"></line>
              <text x="4" y="${y + 4}" fill="rgba(143,169,201,0.72)" font-size="11">${value}</text>`;
          }).join("")}
          ${annual.months.map((month, index) => {
            const x = padLeft + stepX * index + (stepX - barWidth) / 2;
            const barHeight = (month.totalCompleted / maxValue) * chartHeight;
            const y = baseline - barHeight;
            return `
              <rect x="${x}" y="${y}" width="${barWidth}" height="${barHeight}" rx="8" fill="var(--green)" opacity="0.95"><title>${formatAdMonthLabel(annual.year, month.monthIndex)} • ${month.totalCompleted}/${month.totalGoal}</title></rect>
              <text x="${x + barWidth / 2}" y="${y - 7}" text-anchor="middle" fill="var(--green)" font-size="11">${month.totalCompleted}</text>
              <text x="${padLeft + stepX * index + stepX / 2}" y="${baseline + 18}" text-anchor="middle" fill="rgba(143,169,201,0.76)" font-size="11">${month.label}</text>
            `;
          }).join("")}
          <path d="${goalPath}" fill="none" stroke="var(--teal)" stroke-width="3" stroke-dasharray="7 7" stroke-linecap="round"></path>
          <path d="${remainingPath}" fill="none" stroke="var(--pink)" stroke-width="3" stroke-dasharray="4 8" stroke-linecap="round"></path>
          ${goalPoints.map((point) => `<circle cx="${point.x}" cy="${point.y}" r="4" fill="var(--teal)"></circle>`).join("")}
          ${remainingPoints.map((point) => `<circle cx="${point.x}" cy="${point.y}" r="4" fill="var(--pink)"></circle>`).join("")}
        </svg>
      `;
    }

    function renderMonthlyCarryoverStrip(monthlyWeekly) {
      const habit = monthlyWeekly?.carryHabit;
      const carryDates = Array.isArray(monthlyWeekly?.carryDates) ? monthlyWeekly.carryDates : [];
      const carryChecks = Array.isArray(monthlyWeekly?.carryChecks) ? monthlyWeekly.carryChecks : [];
      if (!habit) return "";
      return `
        <div class="matrix-scroll">

    function renderAnnualWeeklyOverviewChart(weekly) {
      const width = 1020;
      const height = 320;
      const padLeft = 26;
      const padRight = 20;
      const chartTop = 22;
      const chartHeight = 214;
      const baseline = chartTop + chartHeight;
      const maxValue = Math.max(
        1,
        ...weekly.months.map((month) => month.weeklyGoal),
        ...weekly.months.map((month) => month.weeklyCompleted),
        ...weekly.months.map((month) => month.weeklyRemaining)
      );
      const stepX = (width - padLeft - padRight) / weekly.months.length;
      const barWidth = Math.min(34, stepX * 0.48);
      const goalPoints = weekly.months.map((month, index) => {
        const x = padLeft + stepX * index + stepX / 2;
        const y = baseline - (month.weeklyGoal / maxValue) * chartHeight;
        return { x, y, month };
      });
      const remainingPoints = weekly.months.map((month, index) => {
        const x = padLeft + stepX * index + stepX / 2;
        const y = baseline - (month.weeklyRemaining / maxValue) * chartHeight;
        return { x, y, month };
      });
      const goalPath = goalPoints.map((point, index) => `${index ? "L" : "M"}${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(" ");
      const remainingPath = remainingPoints.map((point, index) => `${index ? "L" : "M"}${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(" ");

      return `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Annual weekly habits overview">
          ${Array.from({ length: 5 }, (_, index) => index).map((index) => {
            const value = Math.round((maxValue / 4) * index);
            const y = baseline - (value / maxValue) * chartHeight;
            return `<line x1="${padLeft}" y1="${y}" x2="${width - padRight}" y2="${y}" stroke="rgba(145,188,247,0.12)" stroke-dasharray="4 7"></line>
              <text x="4" y="${y + 4}" fill="rgba(143,169,201,0.72)" font-size="11">${value}</text>`;
          }).join("")}
          ${weekly.months.map((month, index) => {
            const x = padLeft + stepX * index + (stepX - barWidth) / 2;
            const barHeight = (month.weeklyCompleted / maxValue) * chartHeight;
            const y = baseline - barHeight;
            return `
              <rect x="${x}" y="${y}" width="${barWidth}" height="${barHeight}" rx="8" fill="var(--green)" opacity="0.95"><title>${formatAdMonthLabel(state.selectedYear, month.monthIndex)} • ${month.weeklyCompleted}/${month.weeklyGoal}</title></rect>
              <text x="${x + barWidth / 2}" y="${y - 7}" text-anchor="middle" fill="var(--green)" font-size="11">${month.weeklyCompleted}</text>
              <text x="${padLeft + stepX * index + stepX / 2}" y="${baseline + 18}" text-anchor="middle" fill="rgba(143,169,201,0.76)" font-size="11">${month.label}</text>
            `;
          }).join("")}
          <path d="${goalPath}" fill="none" stroke="var(--cyan)" stroke-width="3" stroke-dasharray="7 7" stroke-linecap="round"></path>
          <path d="${remainingPath}" fill="none" stroke="var(--pink)" stroke-width="3" stroke-dasharray="4 8" stroke-linecap="round"></path>
          ${goalPoints.map((point) => `<circle cx="${point.x}" cy="${point.y}" r="4" fill="var(--cyan)"></circle>`).join("")}
          ${remainingPoints.map((point) => `<circle cx="${point.x}" cy="${point.y}" r="4" fill="var(--pink)"></circle>`).join("")}
        </svg>
      `;
    }

    function renderWeeklyBreakdownDonut(weekly) {
      const radius = 58;
      const circumference = 2 * Math.PI * radius;
      let offset = 0;
      const segments = weekly.rankedHabits.map((habit) => {
        const portion = weekly.compositionTotal ? habit.annualCompleted / weekly.compositionTotal : 0;
        const length = portion * circumference;
        const segment = {
          color: habit.color,
          dasharray: `${length} ${circumference - length}`,
          dashoffset: -offset
        };
        offset += length;
        return segment;
      });
      const leadHabit = weekly.rankedHabits[0];
      const leadShare = weekly.compositionTotal ? (leadHabit.annualCompleted / weekly.compositionTotal) * 100 : 0;
      return `
        <div class="ring-wrap" style="width:220px;height:220px">
          <svg viewBox="0 0 220 220" aria-hidden="true">
            <circle cx="110" cy="110" r="${radius}" fill="none" stroke="rgba(101,142,191,0.16)" stroke-width="16"></circle>
            ${segments.map((segment) => `
              <circle cx="110" cy="110" r="${radius}" fill="none" stroke="${segment.color}" stroke-width="16" stroke-linecap="butt" stroke-dasharray="${segment.dasharray}" stroke-dashoffset="${segment.dashoffset}" transform="rotate(-90 110 110)"></circle>
            `).join("")}
          </svg>
          <div class="ring-center">
            <div>
              <strong>${leadShare.toFixed(1)}%</strong>
              <span>${escapeHtml(leadHabit.name)}</span>
            </div>
          </div>
        </div>
      `;
    }

    function describePeakDay(series) {
      const peak = series.reduce((best, current) => current.completed > best.completed ? current : best, series[0]);
      return `${formatShortDate(peak.date)} · ${peak.completed}`;
    }

    function timeAgo(timestamp) {
      const diff = Date.now() - timestamp;
      if (diff < 60000) return "just now";
      if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
      return `${Math.floor(diff / 86400000)}d ago`;
    }

    function setView(viewKey) {
      state.view = viewKey;
      location.hash = viewKey;
      saveState();
      render();
    }

    function shiftMonth(offset) {
      const [yearString, monthString] = state.selectedMonth.split("-");
      const date = new Date(Number(yearString), Number(monthString) - 1 + offset, 1);
      setSelectedMonth(`${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`);
    }

    function setSelectedMonth(monthKey) {
      if (!/^\d{4}-\d{2}$/.test(monthKey)) return;
      state.selectedMonth = monthKey;
      state.selectedYear = Number(monthKey.slice(0, 4));
      ensureMonthData(state, monthKey);
      state.ui.selectedWeeklyFocus = 0;
      saveState();
      render();
    }

    function setSelectedYear(yearValue) {
      const year = clampInteger(yearValue, 2000, 2100);
      state.selectedYear = year;
      ensureYearData(state, year);
      const planner = getPlannerData(year);
      planner.startDate = rebasePlannerDateToYear(planner.startDate, year, "01-01");
      planner.endDate = rebasePlannerDateToYear(planner.endDate, year, "12-31");
      if (planner.endDate < planner.startDate) planner.endDate = planner.startDate;
      syncPlannerTargetsToYear(state, year);

      const currentMonthPart = state.selectedMonth.slice(5, 7);
      const nextMonthKey = `${year}-${currentMonthPart}`;
      state.selectedMonth = nextMonthKey;
      ensureMonthData(state, nextMonthKey);
      state.ui.selectedWeeklyFocus = 0;
      saveState();
      render();
    }

    function shiftYear(offset) {
      setSelectedYear(state.selectedYear + offset);
    }

    function setDurationRange(startValue, endValue) {
      const start = startValue || state.durationStart;
      const end = endValue || state.durationEnd;
      state.durationStart = start <= end ? start : end;
      state.durationEnd = start <= end ? end : start;
      saveState();
      render();
    }

    function setPlannerRange(startValue, endValue) {
      const planner = getPlannerData(state.selectedYear);
      planner.startDate = rebasePlannerDateToYear(startValue || planner.startDate, state.selectedYear, "01-01");
      planner.endDate = rebasePlannerDateToYear(endValue || planner.endDate, state.selectedYear, "12-31");
      if (planner.endDate < planner.startDate) {
        if (startValue) planner.endDate = planner.startDate;
        else planner.startDate = planner.endDate;
      }
      ensurePlannerData(state, state.selectedYear);
      syncPlannerTargetsToYear(state, state.selectedYear);
      saveState();
      render();
    }

    function setPlannerStreakCarryOver(value) {
      const planner = getPlannerData(state.selectedYear);
      planner.streakCarryOver = value === true || value === "yes";
      saveState();
      render();
    }

    function setPlannerTarget(habitId, monthIndex, value) {
      const planner = getPlannerData(state.selectedYear);
      const capacities = getPlannerMonthCapacities(planner.startDate, planner.endDate);
      planner.monthlyTargets[habitId][monthIndex] = clampInteger(value, 0, capacities[monthIndex].daysAvailable);
      syncPlannerTargetsToYear(state, state.selectedYear);
      saveState();
      render();
    }

    function copyPlannerTargetsToTracker() {
      syncPlannerTargetsToYear(state, state.selectedYear);
      saveState();
      render();
    }

    function toggleMonthlyCell(habitId, dateKey) {
      const logs = getMonthData(state.selectedMonth).dailyLogs;
      logs[dateKey] = logs[dateKey] || {};
      if (logs[dateKey][habitId]) delete logs[dateKey][habitId];
      else logs[dateKey][habitId] = 1;
      saveState();
      render();
    }

    function toggleWeeklySlot(habitId, weekIndex, slotIndex) {
      const monthData = getMonthData(state.selectedMonth);
      monthData.weeklyChecks[habitId][weekIndex][slotIndex] = !monthData.weeklyChecks[habitId][weekIndex][slotIndex];
      saveState();
      render();
    }

    function setMonthlyGoal(habitId, value) {
      const monthIndex = Number(state.selectedMonth.slice(5, 7)) - 1;
      const planner = getPlannerData(Number(state.selectedMonth.slice(0, 4)));
      const capacities = getPlannerMonthCapacities(planner.startDate, planner.endDate);
      planner.monthlyTargets[habitId][monthIndex] = clampInteger(value, 0, capacities[monthIndex].daysAvailable);
      syncPlannerTargetsToYear(state, Number(state.selectedMonth.slice(0, 4)));
      saveState();
      render();
    }

    function setWeeklyTarget(habitId, weekIndex, value) {
      const monthData = getMonthData(state.selectedMonth);
      monthData.weeklyPlans[habitId][weekIndex] = clampInteger(value, 0, 6);
      ensureMonthData(state, state.selectedMonth);
      saveState();
      render();
    }

    function refreshHabitPlannerTargets(habitId) {
      const habit = state.monthlyHabits.find((item) => item.id === habitId);
      if (!habit) return;
      Object.keys(state.years).forEach((yearKey) => {
        const year = Number(yearKey);
        ensureYearData(state, year);
        const planner = getPlannerData(year);
        planner.monthlyTargets[habitId] = MONTH_NAMES.map((_, monthIndex) => {
          const monthKey = `${year}-${String(monthIndex + 1).padStart(2, "0")}`;
          return estimateMonthlyTargetFromFrequency(habit, monthKey);
        });
        syncPlannerTargetsToYear(state, year);
      });
    }

    function addMonthlyHabit() {
      const clean = `New Habit ${state.monthlyHabits.length + 1}`;
      const idBase = clean.toLowerCase().replace(/[^a-z0-9]+/g, "-");
      let id = idBase;
      let suffix = 2;
      while (state.monthlyHabits.some((habit) => habit.id === id)) {
        id = `${idBase}-${suffix}`;
        suffix += 1;
      }
      const created = normalizeHabitDefinition(createHabitBlueprint({
        id,
        habit_name: clean,
        frequency_rule: "",
        time_anchor: "",
        cue_trigger: "",
        minimum_version: "",
        miss_recovery_step: "",
        color: PALETTE[state.monthlyHabits.length % PALETTE.length],
        display_order: state.monthlyHabits.length,
        orderIndex: state.monthlyHabits.length
      }), state.monthlyHabits.length);
      state.monthlyHabits.push(created);
      state.ui.selectedSetupHabitId = created.id;
      Object.keys(state.years).forEach((yearKey) => ensureYearData(state, Number(yearKey)));
      refreshHabitPlannerTargets(id);
      saveState();
      render();
    }

    function addWeeklyHabit() {
      const name = prompt("New weekly habit name:");
      if (!name) return;
      const clean = name.trim().replace(/\s+/g, " ");
      if (!clean) return;
      const idBase = clean.toLowerCase().replace(/[^a-z0-9]+/g, "-");
      let id = idBase;
      let suffix = 2;
      while (state.weeklyHabits.some((habit) => habit.id === id)) {
        id = `${idBase}-${suffix}`;
        suffix += 1;
      }
      state.weeklyHabits.push({
        id,
        name: clean,
        color: PALETTE[state.weeklyHabits.length % PALETTE.length]
      });
      Object.keys(state.years).forEach((yearKey) => {
        ensureYearData(state, Number(yearKey));
      });
      saveState();
      render();
    }

    function deleteMonthlyHabit(habitId) {
      const habit = state.monthlyHabits.find((item) => item.id === habitId);
      if (!habit) return;
      if (!confirm(`Delete monthly habit "${habit.name}"?`)) return;
      state.monthlyHabits = state.monthlyHabits.filter((item) => item.id !== habitId);
      if (state.ui.selectedSetupHabitId === habitId) {
        state.ui.selectedSetupHabitId = state.monthlyHabits[0] ? state.monthlyHabits[0].id : "";
      }
      Object.keys(state.years).forEach((yearKey) => {
        const yearData = getYearData(Number(yearKey));
        if (yearData.planner && yearData.planner.monthlyTargets) delete yearData.planner.monthlyTargets[habitId];
        Object.keys(yearData.months).forEach((monthKey) => {
          const monthData = yearData.months[monthKey];
          delete monthData.monthlyGoals[habitId];
          Object.keys(monthData.dailyLogs).forEach((dateKey) => {
            if (monthData.dailyLogs[dateKey]) delete monthData.dailyLogs[dateKey][habitId];
          });
        });
      });
      normalizeHabitOrder();
      saveState();
      render();
    }

    function deleteWeeklyHabit(habitId) {
      const habit = state.weeklyHabits.find((item) => item.id === habitId);
      if (!habit) return;
      if (!confirm(`Delete weekly habit "${habit.name}"?`)) return;
      state.weeklyHabits = state.weeklyHabits.filter((item) => item.id !== habitId);
      Object.keys(state.years).forEach((yearKey) => {
        const yearData = getYearData(Number(yearKey));
        Object.keys(yearData.months).forEach((monthKey) => {
          const monthData = yearData.months[monthKey];
          delete monthData.weeklyPlans[habitId];
          delete monthData.weeklyChecks[habitId];
        });
      });
      saveState();
      render();
    }

    function updateMonthlyHabitName(habitId, value) {
      const habit = state.monthlyHabits.find((item) => item.id === habitId);
      if (!habit) return;
      const clean = String(value || "").trim().replace(/\s+/g, " ");
      if (!clean) return;
      habit.name = clean;
      habit.habit_name = clean;
      touchHabit(habit);
      saveState();
      render();
    }

    function updateHabitArchitectureField(habitId, field, value) {
      const habit = state.monthlyHabits.find((item) => item.id === habitId);
      if (!habit) return;
      if (field === "habit_name") {
        const clean = cleanInlineText(value);
        if (!clean) return;
        habit.name = clean;
        habit.habit_name = clean;
      } else if (field === "frequency_rule_preset") {
        habit.frequency_rule_mode = value;
        if (value === "custom") {
          habit.custom_frequency_rule = cleanInlineText(habit.custom_frequency_rule || habit.frequency_rule || "");
          habit.frequency_rule = habit.custom_frequency_rule;
        } else {
          habit.custom_frequency_rule = "";
          habit.frequency_rule = cleanInlineText(value);
        }
      } else if (field === "frequency_rule_custom") {
        habit.frequency_rule_mode = "custom";
        habit.custom_frequency_rule = cleanInlineText(value);
        habit.frequency_rule = habit.custom_frequency_rule;
      } else {
        habit[field] = cleanInlineText(value);
      }
      touchHabit(habit);
      if (field === "frequency_rule_preset" || field === "frequency_rule_custom") {
        refreshHabitPlannerTargets(habitId);
      }
      saveState();
      render();
    }

    function setHabitExactTime(habitId, value) {
      const habit = state.monthlyHabits.find((item) => item.id === habitId);
      if (!habit || !value) return;
      habit.time_anchor = formatTimeValue(value);
      touchHabit(habit);
      saveState();
      render();
    }

    function selectSetupHabit(habitId) {
      if (!state.monthlyHabits.some((habit) => habit.id === habitId)) return;
      state.ui.selectedSetupHabitId = habitId;
      saveState();
      render();
    }

    function duplicateMonthlyHabit(habitId) {
      const source = state.monthlyHabits.find((habit) => habit.id === habitId);
      if (!source) return;
      const idBase = `${source.id}-copy`;
      let id = idBase;
      let suffix = 2;
      while (state.monthlyHabits.some((habit) => habit.id === id)) {
        id = `${idBase}-${suffix}`;
        suffix += 1;
      }
      const clone = normalizeHabitDefinition({
        ...source,
        id,
        habit_id: id,
        name: `${source.habit_name} Copy`,
        habit_name: `${source.habit_name} Copy`,
        created_at: nowIso(),
        updated_at: nowIso(),
        display_order: source.orderIndex + 1,
        orderIndex: source.orderIndex + 1
      }, source.orderIndex + 1);
      state.monthlyHabits.splice(source.orderIndex + 1, 0, clone);
      normalizeHabitOrder();
      state.ui.selectedSetupHabitId = clone.id;
      Object.keys(state.years).forEach((yearKey) => {
        const year = Number(yearKey);
        ensureYearData(state, year);
        const planner = getPlannerData(year);
        planner.monthlyTargets[id] = (planner.monthlyTargets[source.id] || MONTH_NAMES.map(() => 0)).slice();
        syncPlannerTargetsToYear(state, year);
      });
      saveState();
      render();
    }

    function moveMonthlyHabit(habitId, direction) {
      const index = state.monthlyHabits.findIndex((habit) => habit.id === habitId);
      const nextIndex = index + Number(direction);
      if (index < 0 || nextIndex < 0 || nextIndex >= state.monthlyHabits.length) return;
      const [habit] = state.monthlyHabits.splice(index, 1);
      state.monthlyHabits.splice(nextIndex, 0, habit);
      normalizeHabitOrder();
      saveState();
      render();
    }

    function updateWeeklyHabitName(habitId, value) {
      const habit = state.weeklyHabits.find((item) => item.id === habitId);
      if (!habit) return;
      const clean = String(value || "").trim().replace(/\s+/g, " ");
      if (!clean) return;
      habit.name = clean;
      saveState();
      render();
    }

    function updateHabitColor(collection, habitId, value) {
      const habit = state[collection].find((item) => item.id === habitId);
      if (!habit) return;
      habit.color = value;
      if (collection === "monthlyHabits") touchHabit(habit);
      saveState();
      render();
    }

    function updateNote(key, value) {
      getMonthData(state.selectedMonth).notes[key] = value;
      saveState();
    }

    function updateDateSetting(key, value) {
      state.ui[key] = value;
      saveState();
      render();
    }

    function setTheme(value) {
      state.ui.theme = value === "light" ? "light" : "dark";
      saveState();
      render();
    }

    function toggleTheme() {
      setTheme(state.ui.theme === "light" ? "dark" : "light");
    }

    function exportJson() {
      const exportPayload = Object.assign({}, state, {
        _exportMeta: {
          exportedAtAd: new Date().toISOString(),
          exportedAtDual: formatLongDate(new Date()),
          selectedMonthLabel: formatMonthLabel(state.selectedMonth),
          selectedYearLabel: formatDualYearLabel(state.selectedYear)
        }
      });
      const blob = new Blob([JSON.stringify(exportPayload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `habit-intelligence-${state.selectedMonth}.json`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    }

    function importJson(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          state = normalizeState(JSON.parse(String(reader.result || "")));
          saveState();
          render();
        } catch (error) {
          alert("Import failed. The JSON format is not valid for this app.");
        }
      };
      reader.readAsText(file);
    }

    function resetDemo() {
      if (!confirm("Replace all current data with the seeded demo dataset?")) return;
      state = normalizeState(seedState());
      saveState();
      render();
    }

    function handleHashNavigation() {
      const hash = location.hash.replace(/^#/, "");
      if (NAV_ITEMS.some((item) => item.key === hash)) state.view = hash;
    }

    app.addEventListener("click", (event) => {
      const target = event.target.closest("[data-nav], [data-action]");
      if (!target) return;
      if (target.dataset.nav) {
        setView(target.dataset.nav);
        return;
      }
      const action = target.dataset.action;
      if (action === "shift-month") shiftMonth(Number(target.dataset.offset));
      if (action === "shift-year") shiftYear(Number(target.dataset.offset));
      if (action === "set-filter") {
        state.ui.monthlyFilter = target.dataset.filter;
        saveState();
        render();
      }
      if (action === "set-sort") {
        state.ui.monthlySort = target.dataset.sort;
        saveState();
        render();
      }
      if (action === "toggle-monthly-cell") toggleMonthlyCell(target.dataset.habitId, target.dataset.dateKey);
      if (action === "toggle-weekly-slot") toggleWeeklySlot(target.dataset.habitId, Number(target.dataset.weekIndex), Number(target.dataset.slotIndex));
      if (action === "focus-week") {
        state.ui.selectedWeeklyFocus = Number(target.dataset.weekIndex);
        saveState();
        render();
      }
      if (action === "select-setup-habit") selectSetupHabit(target.dataset.id);
      if (action === "duplicate-monthly-habit") duplicateMonthlyHabit(target.dataset.id);
      if (action === "move-monthly-habit") moveMonthlyHabit(target.dataset.id, Number(target.dataset.direction));
      if (action === "apply-setup-value") updateHabitArchitectureField(target.dataset.id, target.dataset.field, target.dataset.value);
      if (action === "set-setup-filter") {
        state.ui.setupFilter = target.dataset.filter;
        saveState();
        render();
      }
      if (action === "save-setup") {
        saveState();
        render();
      }
      if (action === "add-monthly-habit") addMonthlyHabit();
      if (action === "add-weekly-habit") addWeeklyHabit();
      if (action === "delete-monthly-habit") deleteMonthlyHabit(target.dataset.id);
      if (action === "delete-weekly-habit") deleteWeeklyHabit(target.dataset.id);
      if (action === "export-json") exportJson();
      if (action === "reset-demo") resetDemo();
      if (action === "jump-default-month") setSelectedMonth(DEFAULT_MONTH);
      if (action === "install-pwa") installPwa();
      if (action === "copy-planner-targets") copyPlannerTargetsToTracker();
      if (action === "toggle-theme") toggleTheme();
    });

    app.addEventListener("change", (event) => {
      const target = event.target;
      if (target.dataset.input === "month-picker") setSelectedMonth(target.value);
      if (target.dataset.input === "year-picker") setSelectedYear(target.value);
      if (target.dataset.input === "duration-start") setDurationRange(target.value, state.durationEnd);
      if (target.dataset.input === "duration-end") setDurationRange(state.durationStart, target.value);
      if (target.dataset.input === "planner-start") setPlannerRange(target.value, getPlannerData(state.selectedYear).endDate);
      if (target.dataset.input === "planner-end") setPlannerRange(getPlannerData(state.selectedYear).startDate, target.value);
      if (target.dataset.change === "monthly-goal") setMonthlyGoal(target.dataset.id, target.value);
      if (target.dataset.change === "weekly-target") setWeeklyTarget(target.dataset.id, Number(target.dataset.weekIndex), target.value);
      if (target.dataset.change === "planner-target") setPlannerTarget(target.dataset.id, Number(target.dataset.monthIndex), target.value);
      if (target.dataset.change === "planner-streak") setPlannerStreakCarryOver(target.value);
      if (target.dataset.change === "date-display-mode") updateDateSetting("dateDisplayMode", target.value);
      if (target.dataset.change === "theme-mode") setTheme(target.value);
      if (target.dataset.change === "dual-calendar-enabled") updateDateSetting("dualCalendarEnabled", target.value === "yes");
      if (target.dataset.change === "nepali-script-enabled") updateDateSetting("nepaliScriptEnabled", target.value === "script");
      if (target.dataset.change === "nepali-numerals-enabled") updateDateSetting("nepaliNumeralsEnabled", target.value === "on");
      if (target.dataset.change === "monthly-name") updateMonthlyHabitName(target.dataset.id, target.value);
      if (target.dataset.change === "habit-field") updateHabitArchitectureField(target.dataset.id, target.dataset.field, target.value);
      if (target.dataset.change === "habit-time-exact") setHabitExactTime(target.dataset.id, target.value);
      if (target.dataset.change === "weekly-name") updateWeeklyHabitName(target.dataset.id, target.value);
      if (target.dataset.change === "monthly-color") updateHabitColor("monthlyHabits", target.dataset.id, target.value);
      if (target.dataset.change === "weekly-color") updateHabitColor("weeklyHabits", target.dataset.id, target.value);
      if (target.id === "importFile") {
        importJson(target.files[0]);
        target.value = "";
      }
      if (target.dataset.input === "firebase-config") {
        state.ui.firebaseConfigText = target.value;
        saveState();
      }
    });

    app.addEventListener("input", (event) => {
      const target = event.target;
      if (target.dataset.note) updateNote(target.dataset.note, target.value);
      if (target.dataset.input === "firebase-config") {
        state.ui.firebaseConfigText = target.value;
        saveState();
      }
    });

    function installPwa() {
      if (!deferredInstallPrompt) {
        alert(getInstallSupportState().detail);
        return;
      }
      deferredInstallPrompt.prompt();
      deferredInstallPrompt.userChoice.finally(() => {
        deferredInstallPrompt = null;
        render();
      });
    }

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      render();
    });

    window.addEventListener("appinstalled", () => {
      deferredInstallPrompt = null;
      render();
    });

    window.addEventListener("online", render);
    window.addEventListener("offline", render);
    window.addEventListener("hashchange", () => {
      handleHashNavigation();
      render();
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch((error) => {
          console.warn("Service worker registration failed.", error);
        });
      });
    }

    handleHashNavigation();
    render();
  </script>
</body>
</html>
